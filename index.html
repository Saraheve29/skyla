function plainEnglish(wx){
  const coldGap=wx.temp-wx.feels,deceiving=wx.temp>=14&&coldGap>=4;
  const feel=wx.feels<=0?"🥶 Bitterly cold":wx.feels<=5?"🧊 Really cold — hands will hurt":wx.feels<=10?"🧣 Cold enough for a coat":wx.feels<=15?"🍂 Cool and fresh":wx.feels<=19?"😊 Pleasantly mild":wx.feels<=24?"🌸 Warm and lovely":wx.feels<=28?"☀️ Hot and sunny":"🥵 Very hot!";
  const windWord=wx.wind<=5?"Still — no wind at all":wx.wind<=15?"Gentle breeze":wx.wind<=25?"Light wind on your face":wx.wind<=35?"Breezy — hair will blow":wx.wind<=50?"Windy — hold your hat!":"Very windy — stay safe";
  const rainWord=wx.rain<=10?"No rain — dry all day":wx.rain<=30?"Unlikely to rain":wx.rain<=50?"Might get a few drops":wx.rain<=70?"Good chance of rain":wx.rain<=85?"Very likely to rain":"Definitely raining — take umbrella!";
  const verdict=wx.code>=95?"Stay inside if you can — stormy!":wx.code>=71&&wx.code<=77?"Snowing! Roads may be slippy.":wx.rain>70?"You WILL get wet — take umbrella.":deceiving?`Looks nice but sneaky cold! Wind makes it ${coldGap}° colder than it looks.`:wx.feels<=5?"Wrap up completely — really cold.":wx.feels>=25?"Hot day — light clothes, drink water.":wx.feels>=18?"Really nice day — enjoy it!":"Pretty decent day overall.";
  return{feel,windWord,rainWord,verdict,deceiving};
}

function buildAI(wx,city){
  const cold=wx.feels<8,warm=wx.feels>22,rain=wx.rain>50,snow=wx.code>=71&&wx.code<=77,coldGap=wx.temp-wx.feels,deceiving=wx.temp>=14&&coldGap>=4;
  return{
    msg:snow?`Snowy in ${city} — magical but cold! ❄️`:rain?`Rainy in ${city} — umbrella time! ☔`:deceiving?`Looks sunny but sneaky cold in ${city}! 🌞🧥`:cold?`Wrap up warm in ${city} today! 🧣`:warm?`Gorgeous day in ${city}! 🌞`:`Here's your day sorted, ${city}! ✨`,
    wear:snow?"Thickest winter coat + boots":deceiving?"Warm coat — colder than it looks!":cold?"Proper coat essential":warm?"Light breathable clothes":rain?"Waterproof coat and boots":"Light jacket or cardigan",
    take:rain||snow?"Umbrella ☔":wx.wind>35?"Windproof layer 🌬️":warm?"Sunglasses 😎":"Nothing extra 🎒",
    umbrella:rain||snow,
    feel:cold?"Cold & brisk ❄️":warm?"Warm & golden ☀️":rain?"Damp & grey 🌧️":snow?"Cold & magical ❄️":deceiving?"Sunny but cold! 🌞":"Fresh & pleasant ✨",
    tip:deceiving?"The wind makes it much colder than the sunshine suggests — trust the coat!":rain?"Leave 5 mins early — wet pavements slow you down.":snow?"Watch for icy patches — take it slow.":cold?"Dress warmer than you think.":warm?"Great day to be outside!":"Make the most of the fresh air.",
    score:snow?4:rain&&cold?3:rain?5:cold?6:deceiving?6:warm?9:7,
    why:snow?"Snowy day":rain?"Rainy day":warm?"Beautiful weather":cold?"Cold one":deceiving?"Sneaky cold!":"Decent day",
    items:snow?["Winter coat 🧥","Thermal layers 🔥","Snow boots 👢","Hat & gloves 🧤"]:deceiving?["Warm coat 🧥","Jumper underneath 🔥","Closed shoes 👟","Windproof layer 🌬️"]:cold?["Heavy coat 🧥","Warm jumper 🔥","Warm boots 👢","Scarf & gloves 🧣"]:warm?["Light top 👕","Shorts or skirt 🩳","Sandals 👡","Sunglasses 🕶️"]:rain?["Waterproof jacket 🧥","Rain boots 🥾","Quick-dry trousers 👖","Waterproof bag 🎒"]:["Light jacket 🧥","Jeans 👖","Trainers 👟","Light layers 👕"],
    plant:rain?"Rain waters your plants — nothing to do! 🌧️":snow?"Keep plants inside today.":warm?"Water early morning only.":"Check soil — water gently if dry.",
    plantAction:rain?"Nothing to do":snow?"Bring inside":warm?"Water before 9am":"Check soil first",
  };
}

async function tryAI(wx,city,fb){
  try{
    const coldGap=wx.temp-wx.feels,dec=wx.temp>=14&&coldGap>=4;
    const pr=`You are Skyla, a warm friendly AI weather companion. Speak plain simple English like a caring friend — never use technical terms like "feels like X degrees", instead say things like "cold enough to need a coat". ${dec?`IMPORTANT: Today looks nice but wind chill makes it feel ${coldGap}° colder! Warn strongly about this.`:""} Weather: ${city} ${wx.temp}°C feels ${wx.feels}°C ${wmoDesc(wx.code)} rain ${wx.rain}% wind ${wx.wind}km/h. Return ONLY valid JSON: {"msg":"greeting 10 words emoji","wear":"7 plain words","take":"6 words emoji","umbrella":true or false,"feel":"3 words emoji","tip":"14 plain words","score":1-10,"why":"5 words","items":["item emoji","item emoji","item emoji","item emoji"],"plant":"14 words","plantAction":"4 words"}`;
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:pr}]})});
    const d=await r.json();
    const raw=d.content?.find(b=>b.type==="text")?.text??"{}";
    return{...fb,...JSON.parse(raw.replace(/```json|```/g,"").trim())};
  }catch{return fb;}
}

  async function checkEvent(){
    if(!eventDate||!eventName.trim())return;
    setEventLoading(true);setEventResult(null);
    try{
      const dayIdx=Math.round((new Date(eventDate)-new Date())/(86400000));
      const dayData=wx.week[Math.min(dayIdx,6)];
      const pr=`You are Skyla, friendly AI weather assistant. Event: "${eventName}" on ${eventDate} (${dayIdx===0?"today":dayIdx===1?"tomorrow":"in "+dayIdx+" days"}). Forecast: ${dayData?wmoDesc(dayData.code)+" "+dayData.max+"° high "+dayData.min+"° low rain "+dayData.rain+"%":"limited data"}. Give a warm friendly recommendation in 3 short sentences — will it be good for this event? What should they wear/bring? Any advice? Plain English, no jargon.`;
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,messages:[{role:"user",content:pr}]})});
      const d=await r.json();
      const reply=d.content?.find(b=>b.type==="text")?.text||"Looks like a decent day for your event!";
      const dayWx=wx.week[Math.min(Math.max(dayIdx,0),6)];
      setEventResult({text:reply,code:dayWx?.code||1,max:dayWx?.max||wx.maxT,min:dayWx?.min||wx.minT,rain:dayWx?.rain||20});
    }catch{setEventResult({text:"I had trouble checking that date — but I'm here to help! Try again.",code:1,max:wx.maxT,min:wx.minT,rain:20});}
    setEventLoading(false);
  }

  async function checkHoliday(){
    if(!holidayCity.trim()||!holidayFrom||!holidayTo)return;
    setHolidayLoading(true);setHolidayResult(null);
    try{
      const g=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(holidayCity)}&count=1`).then(r=>r.json());
      if(!g.results?.[0]){setHolidayLoading(false);return;}
      const{latitude:la,longitude:lo,name:cn,country:co}=g.results[0];
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max&timezone=auto&forecast_days=7`;
      const d=await fetch(url).then(r=>r.json());
      const avgMax=Math.round(d.daily.temperature_2m_max.reduce((a,b)=>a+b,0)/7);
      const avgMin=Math.round(d.daily.temperature_2m_min.reduce((a,b)=>a+b,0)/7);
      const rainDays=d.daily.precipitation_probability_max.filter(r=>r>50).length;
      const dominantCode=d.daily.weathercode[3]||1;
      const pr=`You are Skyla, friendly travel weather assistant. Holiday to ${cn}, ${co} from ${holidayFrom} to ${holidayTo}. Next 7 days forecast: avg high ${avgMax}°C avg low ${avgMin}°C, ${rainDays} rainy days expected, mainly ${wmoDesc(dominantCode)}. Give warm friendly packing advice in 4 short sentences. What clothes to pack? Umbrella needed? Any weather warnings? Plain English.`;
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:250,messages:[{role:"user",content:pr}]})});
      const dd=await r.json();
      const reply=dd.content?.find(b=>b.type==="text")?.text||"Looks like a great trip!";
      setHolidayResult({city:cn+", "+co,text:reply,avgMax,avgMin,rainDays,code:dominantCode});
    }catch{setHolidayResult({city:holidayCity,text:"I had trouble fetching that destination — try again!",avgMax:20,avgMin:12,rainDays:2,code:1});}
    setHolidayLoading(false);

  async function load(){
    setStage("loading");setWx(null);setAi(null);setViewMode("now");

      lat=p.coords.latitude;lon=p.coords.longitude;
      try{const g=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`).then(r=>r.json());cn=g.address?.city||g.address?.town||g.address?.village||"Your area";}catch{}
    }catch{}
    setCity(cn);
    let W;

      const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,wind_speed_10m,weathercode,is_day&hourly=temperature_2m,precipitation_probability,weathercode,apparent_temperature,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max,apparent_temperature_max&timezone=auto&forecast_days=7`;
      const d=await fetch(url).then(r=>r.json());const cu=d.current;const h=new Date().getHours();
      W={temp:Math.round(cu.temperature_2m),feels:Math.round(cu.apparent_temperature),humid:cu.relative_humidity_2m,wind:Math.round(cu.wind_speed_10m),code:cu.weathercode,isDay:cu.is_day,rain:d.hourly?.precipitation_probability?.[h]??0,maxT:Math.round(d.daily?.temperature_2m_max?.[0]??cu.temperature_2m+2),minT:Math.round(d.daily?.temperature_2m_min?.[0]??cu.temperature_2m-4),hourly:[...Array(24)].map((_,i)=>({h:i,lbl:`${i===0?"12am":i<12?i+"am":i===12?"12pm":(i-12)+"pm"}`,temp:Math.round(d.hourly?.temperature_2m?.[i]??cu.temperature_2m),feels:Math.round(d.hourly?.apparent_temperature?.[i]??cu.apparent_temperature),rain:d.hourly?.precipitation_probability?.[i]??0,code:d.hourly?.weathercode?.[i]??cu.weathercode,wind:Math.round(d.hourly?.wind_speed_10m?.[i]??cu.wind_speed_10m)})),week:[0,1,2,3,4,5,6].map(i=>({code:d.daily?.weathercode?.[i]??0,max:Math.round(d.daily?.temperature_2m_max?.[i]??cu.temperature_2m),min:Math.round(d.daily?.temperature_2m_min?.[i]??cu.temperature_2m-4),feels:Math.round(d.daily?.apparent_temperature_max?.[i]??cu.apparent_temperature),rain:d.daily?.precipitation_probability_max?.[i]??0,day:i===0?"Today":i===1?"Tomorrow":new Date(Date.now()+i*86400000).toLocaleDateString([],{weekday:"long"}),short:i===0?"Today":i===1?"Tmrw":new Date(Date.now()+i*86400000).toLocaleDateString([],{weekday:"short"})}))};
    }catch{W={temp:16,feels:11,humid:70,wind:28,code:1,isDay:1,rain:20,maxT:18,minT:9,hourly:[...Array(24)].map((_,i)=>({h:i,lbl:`${i===0?"12am":i<12?i+"am":i===12?"12pm":(i-12)+"pm"}`,temp:9+Math.round(8*Math.sin((i-6)*Math.PI/12)),feels:6+Math.round(6*Math.sin((i-6)*Math.PI/12)),rain:i>15&&i<20?65:15,code:i>15&&i<20?61:1,wind:25})),week:[0,1,2,3,4,5,6].map(i=>({code:[1,2,61,3,0,2,1][i],max:[18,16,13,11,17,19,20][i],min:[9,8,7,6,8,9,10][i],feels:[13,11,8,7,13,15,16][i],rain:[20,35,75,65,15,20,10][i],day:["Today","Tomorrow","Wednesday","Thursday","Friday","Saturday","Sunday"][i],short:["Today","Tmrw","Wed","Thu","Fri","Sat","Sun"][i]}))}}
    setWx(W);
    const newA=[];
    if(W.rain>70)newA.push({i:"🌧️",t:"Rain Alert",m:`${W.rain}% rain today — umbrella essential`,c:"#1D4ED8"});
    if(W.feels<2)newA.push({i:"🥶",t:"Really Cold!",m:"Feels freezing — wrap up completely",c:"#0EA5E9"});
    if(W.feels>28)newA.push({i:"🌡️",t:"Very Hot!",m:`${W.temp}°C today — stay hydrated`,c:"#EF4444"});
    if(W.wind>45)newA.push({i:"💨",t:"Very Windy",m:`${W.wind}km/h — hold onto your hat!`,c:"#8B5CF6"});
    const cg=W.temp-W.feels;
    if(W.temp>=14&&cg>=4)newA.push({i:"⚠️",t:"Don't Be Fooled!",m:`Looks nicer than it feels — wind makes it ${cg}° colder!`,c:"#F59E0B"});
    if(W.rain<15&&W.temp>15)newA.push({i:"✨",t:"Nice Day!",m:"Good conditions — great for being outside",c:"#10B981"});
    setAlerts(newA);
    const fb=buildAI(W,cn);setAi(fb);setStage("done");
    const nH=[{date:new Date().toLocaleDateString([],{weekday:"short",day:"numeric",month:"short"}),score:fb.score,emoji:SC[wxType(W.code,W.isDay)].em},...oldH].slice(0,14);
    ss("skyla_hist",nH);setHist(nH);
    tryAI(W,cn,fb).then(setAi);
  }

  function getDisplayWx(){
    if(!wx)return null;
    if(viewMode==="hour"&&pickedH!==null){const h=wx.hourly[pickedH];return{...wx,temp:h.temp,feels:h.feels,rain:h.rain,code:h.code,wind:h.wind,isDay:pickedH>=6&&pickedH<20?1:0};}
    if(viewMode==="day"&&pickedD>0){const d=wx.week[pickedD];return{...wx,temp:d.max,feels:d.feels,rain:d.rain,code:d.code,isDay:1,maxT:d.max,minT:d.min};}
    return wx;
  }

  async function addFamMember(){
    if(!famName.trim()||!famCity.trim())return;
    try{
      const g=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(famCity)}&count=1`).then(r=>r.json());
      if(!g.results?.[0])return;
      const{latitude:la,longitude:lo}=g.results[0];
      const d=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&current=temperature_2m,weathercode,is_day&hourly=precipitation_probability&timezone=auto&forecast_days=1`).then(r=>r.json());
      const emojis=["👩","👨","👧","👦","👴","👵","🧑","👶"];
      setFam(f=>[...f,{name:famName,city:famCity,emoji:emojis[f.length%8],temp:Math.round(d.current.temperature_2m),code:d.current.weathercode,isDay:d.current.is_day,rain:d.hourly?.precipitation_probability?.[new Date().getHours()]??0}]);
    }catch{}
    setFamName("");setFamCity("");setAddFam(false);
  }

  function speak(){
    if(!ai||!DWX)return;
    if(talking){window.speechSynthesis.cancel();setTalking(false);return;}
    const gr=clock.getHours()<12?"morning":clock.getHours()<17?"afternoon":"evening";

function Character({type,gender}){

function Arc({score,acc}){
  const r=36,c=2*Math.PI*r,arc=(score/10)*c*.72,off=c*.14;
  return(<svg width="90" height="90" viewBox="0 0 90 90"><circle cx="45" cy="45" r={r} fill="none" stroke="rgba(255,255,255,.15)" strokeWidth="6" strokeDasharray={`${c*.72} ${c*.28}`} strokeDashoffset={-off} strokeLinecap="round"/><circle cx="45" cy="45" r={r} fill="none" stroke={acc} strokeWidth="6" strokeDasharray={`${arc} 999`} strokeDashoffset={-off} strokeLinecap="round" style={{transition:"stroke-dasharray 1.5s ease",filter:`drop-shadow(0 0 8px ${acc}80)`}}/><text x="45" y="41" textAnchor="middle" fill={acc} style={{fontSize:20,fontWeight:900,fontFamily:"Fraunces"}}>{score}</text><text x="45" y="54" textAnchor="middle" fill={acc} style={{fontSize:8.5,fontWeight:700,fontFamily:"DM Sans",opacity:.8}}>OUT OF 10</text></svg>);
}

function sg(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

function plainEnglish(wx){
  const coldGap=wx.temp-wx.feels,deceiving=wx.temp>=14&&coldGap>=4;
  const feel=wx.feels<=0?"🥶 Bitterly cold":wx.feels<=5?"🧊 Really cold — hands will hurt":wx.feels<=10?"🧣 Cold enough for a coat":wx.feels<=15?"🍂 Cool and fresh":wx.feels<=19?"😊 Pleasantly mild":wx.feels<=24?"🌸 Warm and lovely":wx.feels<=28?"☀️ Hot and sunny":"🥵 Very hot!";
  const windWord=wx.wind<=5?"Still — no wind at all":wx.wind<=15?"Gentle breeze":wx.wind<=25?"Light wind on your face":wx.wind<=35?"Breezy — hair will blow":wx.wind<=50?"Windy — hold your hat!":"Very windy — stay safe";
  const rainWord=wx.rain<=10?"No rain — dry all day":wx.rain<=30?"Unlikely to rain":wx.rain<=50?"Might get a few drops":wx.rain<=70?"Good chance of rain":wx.rain<=85?"Very likely to rain":"Definitely raining — take umbrella!";
  const verdict=wx.code>=95?"Stay inside if you can — stormy!":wx.code>=71&&wx.code<=77?"Snowing! Roads may be slippy.":wx.rain>70?"You WILL get wet — take umbrella.":deceiving?`Looks nice but sneaky cold! Wind makes it ${coldGap}° colder than it looks.`:wx.feels<=5?"Wrap up completely — really cold.":wx.feels>=25?"Hot day — light clothes, drink water.":wx.feels>=18?"Really nice day — enjoy it!":"Pretty decent day overall.";
  return{feel,windWord,rainWord,verdict,deceiving};
}

function buildAI(wx,city){
  const cold=wx.feels<8,warm=wx.feels>22,rain=wx.rain>50,snow=wx.code>=71&&wx.code<=77,coldGap=wx.temp-wx.feels,deceiving=wx.temp>=14&&coldGap>=4;
  return{
    msg:snow?`Snowy in ${city} — magical but cold! ❄️`:rain?`Rainy in ${city} — umbrella time! ☔`:deceiving?`Looks sunny but sneaky cold in ${city}! 🌞🧥`:cold?`Wrap up warm in ${city} today! 🧣`:warm?`Gorgeous day in ${city}! 🌞`:`Here's your day sorted, ${city}! ✨`,
    wear:snow?"Thickest winter coat + boots":deceiving?"Warm coat — colder than it looks!":cold?"Proper coat essential":warm?"Light breathable clothes":rain?"Waterproof coat and boots":"Light jacket or cardigan",
    take:rain||snow?"Umbrella ☔":wx.wind>35?"Windproof layer 🌬️":warm?"Sunglasses 😎":"Nothing extra 🎒",
    umbrella:rain||snow,
    feel:cold?"Cold & brisk ❄️":warm?"Warm & golden ☀️":rain?"Damp & grey 🌧️":snow?"Cold & magical ❄️":deceiving?"Sunny but cold! 🌞":"Fresh & pleasant ✨",
    tip:deceiving?"The wind makes it much colder than the sunshine suggests — trust the coat!":rain?"Leave 5 mins early — wet pavements slow you down.":snow?"Watch for icy patches — take it slow.":cold?"Dress warmer than you think.":warm?"Great day to be outside!":"Make the most of the fresh air.",
    score:snow?4:rain&&cold?3:rain?5:cold?6:deceiving?6:warm?9:7,
    why:snow?"Snowy day":rain?"Rainy day":warm?"Beautiful weather":cold?"Cold one":deceiving?"Sneaky cold!":"Decent day",
    items:snow?["Winter coat 🧥","Thermal layers 🔥","Snow boots 👢","Hat & gloves 🧤"]:deceiving?["Warm coat 🧥","Jumper underneath 🔥","Closed shoes 👟","Windproof layer 🌬️"]:cold?["Heavy coat 🧥","Warm jumper 🔥","Warm boots 👢","Scarf & gloves 🧣"]:warm?["Light top 👕","Shorts or skirt 🩳","Sandals 👡","Sunglasses 🕶️"]:rain?["Waterproof jacket 🧥","Rain boots 🥾","Quick-dry trousers 👖","Waterproof bag 🎒"]:["Light jacket 🧥","Jeans 👖","Trainers 👟","Light layers 👕"],
    plant:rain?"Rain waters your plants — nothing to do! 🌧️":snow?"Keep plants inside today.":warm?"Water early morning only.":"Check soil — water gently if dry.",
    plantAction:rain?"Nothing to do":snow?"Bring inside":warm?"Water before 9am":"Check soil first",
  };
}

async function tryAI(wx,city,fb){
  try{
    const coldGap=wx.temp-wx.feels,dec=wx.temp>=14&&coldGap>=4;
    const pr=`You are Skyla, a warm friendly AI weather companion. Speak plain simple English like a caring friend — never use technical terms like "feels like X degrees", instead say things like "cold enough to need a coat". ${dec?`IMPORTANT: Today looks nice but wind chill makes it feel ${coldGap}° colder! Warn strongly about this.`:""} Weather: ${city} ${wx.temp}°C feels ${wx.feels}°C ${wmoDesc(wx.code)} rain ${wx.rain}% wind ${wx.wind}km/h. Return ONLY valid JSON: {"msg":"greeting 10 words emoji","wear":"7 plain words","take":"6 words emoji","umbrella":true or false,"feel":"3 words emoji","tip":"14 plain words","score":1-10,"why":"5 words","items":["item emoji","item emoji","item emoji","item emoji"],"plant":"14 words","plantAction":"4 words"}`;
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:pr}]})});
    const d=await r.json();
    const raw=d.content?.find(b=>b.type==="text")?.text??"{}";
    return{...fb,...JSON.parse(raw.replace(/```json|```/g,"").trim())};
  }catch{return fb;}
}

  async function checkEvent(){

      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,messages:[{role:"user",content:pr}]})});
      const d=await r.json();

      const dayWx=wx.week[Math.min(Math.max(dayIdx,0),6)];

  async function checkHoliday(){

      if(!g.results?.[0]){setHolidayLoading(false);return;}

      const rainDays=d.daily.precipitation_probability_max.filter(r=>r>50).length;
      const dominantCode=d.daily.weathercode[3]||1;

      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:250,messages:[{role:"user",content:pr}]})});
      const dd=await r.json();
      const reply=dd.content?.find(b=>b.type==="text")?.text||"Looks like a great trip!";
      setHolidayResult({city:cn+", "+co,text:reply,avgMax,avgMin,rainDays,code:dominantCode});

    setChatLoading(true);
    try{
      const pr=`You are Skyla, a warm friendly AI weather assistant. Current weather in ${city}: ${wx?wx.temp:"?"}°C feels ${wx?wx.feels:"?"}°C ${wx?wmoDesc(wx.code):""} rain ${wx?wx.rain:"?"}% wind ${wx?wx.wind:"?"}km/h. Week ahead: ${wx?wx.week.map((d,i)=>d.day+" "+wmoDesc(d.code)+" "+d.max+"°").join(", "):"unknown"}. Answer the user's question in plain simple English like a caring friend — short, warm, no jargon. Never say 'feels like X degrees'. Max 3 sentences.`;

  async function load(){
    setStage("loading");setWx(null);setAi(null);setViewMode("now");

    }catch{}

                  <Lbl>🎨 Personalise Skyla</Lbl>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    {[{id:"female",icon:"👧",label:"Skyla Girl",desc:"Pink girl 🩷"},{id:"male",icon:"👦",label:"Skyla Boy",desc:"Cool boy 💙"}].map(opt=>(
                      <button key={opt.id} onClick={()=>toggleGender(opt.id)} style={{background:gender===opt.id?`${S.acc}25`:"rgba(255,255,255,.12)",border:gender===opt.id?`2px solid ${S.acc}`:`1px solid ${S.bdr}`,borderRadius:18,padding:"16px 12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",textAlign:"center",transition:"all .2s"}}>
                        <div style={{fontSize:36,marginBottom:8}}>{opt.icon}</div>
                        <div style={{fontSize:13,fontWeight:800,color:gender===opt.id?S.acc:"inherit"}}>{opt.label}</div>
                        <div style={{fontSize:11,opacity:.6,marginTop:3}}>{opt.desc}</div>
                        {gender===opt.id&&<div style={{fontSize:10,color:S.acc,fontWeight:700,marginTop:6}}>✓ Active</div>}
                      </button>
                    ))}
                  </div>
                </Card>
                {isPremium&&(
                  <div style={{...G,padding:"22px",marginBottom:12,border:`1px solid ${S.acc}35`}}>
                    <Lbl>🌅 Morning Briefing</Lbl>
                    <div style={{fontSize:13,opacity:.7,marginBottom:14,lineHeight:1.6}}>Skyla sends you a weather briefing every morning. Set your wake-up time below.</div>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <input type="time" value={briefingTime} onChange={e=>setBriefingTime(e.target.value)} style={{flex:1,background:"rgba(255,255,255,.18)",border:`1px solid ${S.bdr}`,borderRadius:14,padding:"12px 16px",fontSize:18,fontWeight:700,color:S.text,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
                      <button onClick={saveBriefing} style={{background:briefingSaved?"#10B981":S.acc,border:"none",borderRadius:14,padding:"12px 18px",fontSize:13,fontWeight:800,color:"white",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"background .3s"}}>
                        {briefingSaved?"✓ Saved!":"Set Time"}
                      </button>
                    </div>
                    {briefingSaved&&<div style={{fontSize:12,color:"#10B981",fontWeight:600,marginTop:10}}>✓ Briefing set for {briefingTime} every morning!</div>}
                    <div style={{fontSize:11,opacity:.45,marginTop:10}}>You'll get Skyla's weather summary each morning at this time.</div>
                  </div>
                )}
                {!isPremium&&(
                  <div style={{...G,padding:"16px",marginBottom:12,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>setShowPaywall(true)}>
                    <div style={{fontSize:28}}>🌅</div>
                    <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>Morning Briefing</div><div style={{fontSize:11,opacity:.5}}>Wake up to Skyla's daily forecast</div></div>
                    <div style={{background:"#E91E8C",borderRadius:10,padding:"5px 10px",fontSize:10,fontWeight:800,color:"white"}}>PREMIUM</div>
                  </div>
                )}
                <Card>
                  <Lbl>🔔 Today's Alerts</Lbl>
                  {alerts.length===0?<div style={{textAlign:"center",padding:"16px 0",opacity:.55,fontSize:14}}>✓ All clear today!</div>:alerts.map((a,i)=>(
                    <div key={i} style={{display:"flex",gap:12,padding:"12px 0",borderBottom:i<alerts.length-1?`1px solid ${S.bdr}`:"none"}}>
                      <div style={{width:40,height:40,borderRadius:12,background:`${a.c}22`,border:`1px solid ${a.c}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{a.i}</div>
                      <div><div style={{fontSize:13,fontWeight:700,marginBottom:3}}>{a.t}</div><div style={{fontSize:12,opacity:.65,lineHeight:1.5}}>{a.m}</div></div>
                    </div>
                  ))}
                </Card>
                <Card>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <Lbl>⭐ Score History</Lbl>
                    {avg&&<div style={{fontSize:13,fontWeight:800,color:S.acc,paddingBottom:10}}>7-day avg: {avg}/10</div>}
                  </div>
                  {hist.length===0?<div style={{textAlign:"center",padding:"16px 0",opacity:.5}}>Open Skyla daily to build history!</div>:(
                    <div>
                      <div style={{display:"flex",gap:5,alignItems:"flex-end",height:68,marginBottom:14}}>
                        {hist.slice(0,7).reverse().map((s,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{fontSize:9,opacity:.6,fontWeight:600}}>{s.score}</div><div style={{width:"100%",background:`linear-gradient(180deg,${S.acc},${S.acc}70)`,borderRadius:"4px 4px 0 0",height:`${(s.score/10)*52}px`,minHeight:4}}/></div>)}
                      </div>
                      {hist.slice(0,7).map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<Math.min(hist.length,7)-1?`1px solid ${S.bdr}`:"none"}}><span style={{fontSize:16}}>{s.emoji}</span><div style={{flex:1,fontSize:12,opacity:.55}}>{s.date}</div><div style={{fontSize:15,fontWeight:800,color:s.score>=7?S.acc:s.score>=5?"#F59E0B":"#EF4444"}}>{s.score}/10</div></div>)}
                    </div>
                  )}
                </Card>
                <Card>
                  <Lbl>🔥 Your Streak</Lbl>
                  <div style={{display:"flex",alignItems:"center",gap:16}}>
                    <div style={{fontSize:52}}>🔥</div>
                    <div>
                      <div style={{fontFamily:"'Fraunces',serif",fontSize:46,fontWeight:900,color:S.acc,lineHeight:1}}>{streak}</div>
                      <div style={{fontSize:13,opacity:.6,marginTop:4}}>day{streak!==1?"s":""} in a row</div>
                      <div style={{fontSize:12,opacity:.5,marginTop:3}}>{streak<3?"Keep going!":streak<7?"Building a habit 🎯":streak<30?"On fire! 🔥":"Legendary! 👑"}</div>
                    </div>
                  </div>
                </Card>
              </div>
            )}

            <button onClick={load} style={{width:"100%",marginTop:4,...G,borderRadius:100,padding:"15px",color:S.sub,fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:700,cursor:"pointer",transition:"all .25s"}}
              onMouseEnter={e=>{e.currentTarget.style.background=S.acc;e.currentTarget.style.color="white";}}
              onMouseLeave={e=>{e.currentTarget.style.background=G.background;e.currentTarget.style.color=S.sub;}}>
              ↻ &nbsp;Refresh Skyla
            </button>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
