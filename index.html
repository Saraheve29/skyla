<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── Storage helpers ──────────────────────────────────────────────────────────
function sg(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ── WMO weather code descriptions ────────────────────────────────────────────
function wmoDesc(c){
  const m={0:"Clear sky",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",
    45:"Foggy",48:"Icy fog",51:"Light drizzle",53:"Drizzle",55:"Heavy drizzle",
    61:"Light rain",63:"Rain",65:"Heavy rain",71:"Light snow",73:"Snow",75:"Heavy snow",
    77:"Snow grains",80:"Light showers",81:"Showers",82:"Heavy showers",
    85:"Snow showers",86:"Heavy snow showers",95:"Thunderstorm",96:"Thunderstorm + hail",99:"Thunderstorm + heavy hail"};
  return m[c]??"Cloudy";
}

// ── Weather type from code + isDay ───────────────────────────────────────────
function wxType(c,d){
  if(!d)return"night";
  if(c===0)return"sunny";
  if(c<=2)return"partly";
  if(c<=3)return"cloudy";
  if(c<=67||c<=82)return"rainy";
  if(c<=77)return"snowy";
  if(c>=95)return"stormy";
  return"partly";
}

// ── Scene colours ────────────────────────────────────────────────────────────
const SC={
  sunny: {acc:"#D97706",text:"#1C0A00",sub:"rgba(28,10,0,.5)",bdr:"rgba(255,255,255,.45)",em:"☀️",name:"Sunny"},
  partly: {acc:"#2563EB",text:"#0C1A3D",sub:"rgba(12,26,61,.5)",bdr:"rgba(255,255,255,.5)",em:"⛅",name:"Partly Cloudy"},
  cloudy: {acc:"#475569",text:"#0F172A",sub:"rgba(15,23,42,.5)",bdr:"rgba(255,255,255,.38)",em:"☁️",name:"Overcast"},
  rainy:  {acc:"#60A5FA",text:"#EFF6FF",sub:"rgba(239,246,255,.55)",bdr:"rgba(255,255,255,.18)",em:"🌧️",name:"Rainy"},
  snowy:  {acc:"#0369A1",text:"#082F49",sub:"rgba(8,47,73,.5)",bdr:"rgba(255,255,255,.5)",em:"❄️",name:"Snowy"},

};

// ── Plain English weather logic ───────────────────────────────────────────────
function plainEnglish(w){
  if(!w)return{verdict:"",feel:"",windWord:"",rainWord:"",deceiving:false};
  const{temp,feels,wind,rain,humid}=w;
  const coldGap=temp-feels;
  const deceiving=temp>=14&&coldGap>=4;
  const verdict=deceiving
    ?`Sneaky one — it looks nicer than it is! The wind makes it feel ${coldGap}° colder than it looks.`
    :feels<=4?"It's bitterly cold out there — wrap up properly!"
    :feels<=8?"It's cold — you'll definitely need a warm coat."
    :feels<=12?"It's chilly — a good jacket is a must."
    :feels<=16?"It's cool and fresh — a light jacket would be perfect."
    :feels<=20?"It's mild and pleasant — a light layer should do it."
    :feels<=24?"It's warm and lovely — light clothing works perfectly."
    :"It's hot today — stay cool and drink plenty of water!";
  const feel=feels<=4?"Bitterly cold 🥶":feels<=8?"Cold ❄️":feels<=12?"Chilly 🧥":feels<=16?"Cool & fresh 🍂":feels<=20?"Mild & pleasant 🌤️":feels<=24?"Warm & lovely ☀️":"Hot! 🌞";
  const windWord=wind<10?"Calm — barely any wind.":wind<20?"A light breeze.":wind<35?"A noticeable breeze on your face.":wind<50?"It's quite windy today.":"Very windy — hold onto your hat!";
  const rainWord=rain<15?"Looks dry — no umbrella needed.":rain<40?"Small chance of a shower — might be fine.":rain<65?"Rain likely — pop an umbrella in your bag.":"Very likely to rain — definitely take your umbrella!";
  return{verdict,feel,windWord,rainWord,deceiving,coldGap};
}

    night:"linear-gradient(175deg,#020408 0%,#060d1f 30%,#0a1628 55%,#0f2340 80%,#162a4a 100%)",
  };
  const bg=bgs[type]||bgs.partly;

  const Sunny=()=><>

  </>;

  const Stormy=()=><>
    {[...Array(60)].map((_,i)=><div key={i} style={{position:"absolute",left:`${(i*4.7+i*.3)%100}%`,top:"-35px",width:`${i%4===0?2.5:i%3===0?2:1.5}px`,height:`${i%3===0?27:i%2===0?21:16}px`,background:`rgba(120,120,200,${.28+i%5*.09})`,borderRadius:3,animation:`rainFall ${.44+i%5*.1}s linear infinite`,animationDelay:`${(i*.055)%1.8}s`,transform:`rotate(${14+i%10}deg)`}}/>)}

  </>;

  const Cloudy=()=><>
    {[{t:40,l:"-300px",d:40},{t:110,l:"-260px",d:55},{t:200,l:"-280px",d:48}].map((c,i)=><div key={i} style={{position:"absolute",top:c.t,left:c.l,animation:`cloudSail ${c.d}s linear infinite`,animationDelay:`${i*-14}s`,opacity:.75}}><svg width="180" height="65"><ellipse cx="90" cy="45" rx="80" ry="22" fill="rgba(180,190,200,.8)"/><ellipse cx="60" cy="35" rx="48" ry="30" fill="rgba(180,190,200,.8)"/><ellipse cx="120" cy="33" rx="44" ry="27" fill="rgba(180,190,200,.8)"/></svg></div>)}
  </>;

  return(
    <div style={{position:"fixed",inset:0,background:bg,zIndex:-1,overflow:"hidden",transition:"background 1.5s ease"}}>
      {type==="sunny"&&<Sunny/>}
      {type==="rainy"&&<Rainy/>}
      {type==="snowy"&&<Snowy/>}
      {type==="stormy"&&<Stormy/>}
      {type==="night"&&<Night/>}
      {(type==="cloudy"||type==="partly")&&<Cloudy/>}
    </div>
  );
}

  async function speak(){
    if(!wx)return;
    if(talking){
      window.speechSynthesis.cancel();
      if(window._skylaAudio){window._skylaAudio.pause();window._skylaAudio=null;}
      setTalking(false);return;
    }
    const gr=clock.getHours()<12?"morning":clock.getHours()<17?"afternoon":"evening";
    const PE=plainEnglish(wx);
    const txt="Good "+gr+"! I am Skyla! "+PE.verdict+" In "+city+" it is "+wx.temp+" degrees. "+PE.feel+". "+PE.windWord+" "+PE.rainWord+" "+(ai?.tip||"")+" Have a wonderful "+gr+"!";
    const isMale=gender==="male";
    
    // First try ElevenLabs via our server
    try{
      const r=await fetch("/api/speak",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text:txt,voiceId:isMale?"MYiFAKeVwcvm4z9VsFAR":"PoHUWWWMHFrA8z7Q88pu"})
      });
      if(r.ok){
        const blob=await r.blob();
        const url=URL.createObjectURL(blob);
        const audio=new Audio(url);
        window._skylaAudio=audio;
        audio.onended=()=>{setTalking(false);URL.revokeObjectURL(url);};
        audio.onerror=()=>{setTalking(false);};
        setTalking(true);
        await audio.play();
        return;
      }
    }catch(e){console.log("ElevenLabs unavailable, using browser voice");}
    
    // Browser voice fallback
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    u.volume=1;
    
    if(isMale){
      u.pitch=0.85;u.rate=1.0;
    }else{
      u.pitch=1.8;u.rate=1.1;
    }
    
    function pickVoice(voices){
      if(isMale){
        return voices.find(v=>v.name==="Daniel")||
               voices.find(v=>v.name==="Google UK English Male")||
               voices.find(v=>v.name.includes("Male")&&v.lang.startsWith("en"))||
               voices.find(v=>v.lang==="en-GB")||
               voices.find(v=>v.lang.startsWith("en"));
      }else{
        return voices.find(v=>v.name==="Samantha")||
               voices.find(v=>v.name==="Karen")||
               voices.find(v=>v.name==="Google UK English Female")||
               voices.find(v=>v.name==="Microsoft Zira - English (United States)")||
               voices.find(v=>v.name==="Zira")||
               voices.find(v=>v.name==="Hazel")||
               voices.find(v=>v.name.toLowerCase().includes("female")&&v.lang.startsWith("en"))||
               voices.filter(v=>v.lang.startsWith("en"))[1]||
               voices.find(v=>v.lang.startsWith("en"));
      }
    }
    
    u.onend=()=>setTalking(false);
    u.onerror=()=>setTalking(false);
    setTalking(true);
    
    const voices=window.speechSynthesis.getVoices();
    if(voices.length>0){
      const v=pickVoice(voices);
      if(v)u.voice=v;
      window.speechSynthesis.speak(u);
    }else{
      window.speechSynthesis.onvoiceschanged=()=>{
        const vs=window.speechSynthesis.getVoices();
        const v=pickVoice(vs);
        if(v)u.voice=v;
        window.speechSynthesis.speak(u);
      };
    }
  }

    function fallbackSpeak(txt,isMale){
    function doSpeak(voices){
      const u=new SpeechSynthesisUtterance(txt);
      u.rate=isMale?1.05:1.1;
      u.pitch=isMale?0.88:1.5;
      u.volume=1;
      const v=isMale
        ?voices.find(v=>v.name.includes("Daniel"))||voices.find(v=>v.name.includes("Oliver"))||voices.find(v=>v.name.includes("Arthur"))||voices.find(v=>v.lang.startsWith("en"))
        :voices.find(v=>v.name.includes("Samantha"))||voices.find(v=>v.name.includes("Karen"))||voices.find(v=>v.name.includes("Serena"))||voices.find(v=>v.name.includes("Zira"))||voices.find(v=>v.lang.startsWith("en"));
      if(v)u.voice=v;
      u.onend=()=>setTalking(false);
      setTalking(true);
      window.speechSynthesis.speak(u);
    }
    const voices=window.speechSynthesis.getVoices();
    if(voices.length>0){doSpeak(voices);}
    else{window.speechSynthesis.onvoiceschanged=()=>doSpeak(window.speechSynthesis.getVoices());}
  }

  function checkAlerts(w){
    if(!w)return;
    const als=[];

    function dayLabel(i){
      return i===0?"today":i===1?"tomorrow":w.week[i]?.day||"day "+i;
    }

    function addAlert(level,title,msg,color,bg,day){
      const when=day===0?"today":day===1?"tomorrow":"on "+dayLabel(day);
      const whenCap=day===0?"Today":day===1?"Tomorrow":w.week[day]?.day||"Soon";
      als.push({level,title:whenCap+" — "+title,msg,color,bg,day});
    }

    // Check today AND next 6 days
    const days=[{temp:w.temp,feels:w.feels,wind:w.wind,rain:w.rain,code:w.code,max:w.maxT,min:w.minT},...(w.week||[]).slice(1,7).map(d=>({temp:d.max,feels:d.feels||d.max-2,wind:30,rain:d.rain,code:d.code,max:d.max,min:d.min}))];

    days.forEach((d,i)=>{
      const{temp,feels,wind,rain,code,max}=d;
      const when=dayLabel(i);

      // Thunderstorm
      if(code>=95){addAlert("🔴 RED","Thunderstorm Warning","Dangerous thunderstorm expected "+when+". Stay indoors, away from windows. Unplug your devices and avoid open water. Plan ahead if you need to go anywhere.","#7C3AED","rgba(124,58,237,.15)",i);}
      // Heavy snow
      else if(code>=73&&code<=77){addAlert("🔴 RED","Heavy Snow Warning","Heavy snow expected "+when+". Only travel if essential. Stock up on what you need today and stay warm at home — roads will be dangerous.","#0369A1","rgba(3,105,161,.15)",i);}
      // Light snow
      else if(code===71||code===72){addAlert("🟡 YELLOW","Snow Warning","Snow is expected "+when+". Allow extra travel time and wear warm waterproof boots. Roads may be slippery.","#0369A1","rgba(3,105,161,.12)",i);}
      // Extreme heat
      if(max>=35){addAlert("🔴 RED","Extreme Heat Warning","Dangerously hot "+when+" — up to "+max+"°C. Stay indoors in the coolest room. Drink water every hour and keep your curtains closed to stay cool.","#DC2626","rgba(220,38,38,.15)",i);}
      else if(max>=30){addAlert("🟠 AMBER","Heat Wave Alert","Very hot "+when+" — up to "+max+"°C. Keep yourself cool, drink plenty of water and wear suncream if you head outside.","#D97706","rgba(217,119,6,.15)",i);}
      else if(max>=28){addAlert("🟡 YELLOW","Hot Weather","It's going to be warm "+when+" — "+max+"°C. Stay hydrated and use suncream if you're outside for long.","#CA8A04","rgba(202,138,4,.12)",i);}
      // Severe cold
      if(feels<=-10){addAlert("🔴 RED","Severe Cold Warning","Dangerously cold "+when+". Stay indoors if you can. If you do go out cover all your skin and wear as many layers as possible.","#1D4ED8","rgba(29,78,216,.15)",i);}
      else if(feels<=-5){addAlert("🟠 AMBER","Freezing Conditions","Very cold "+when+" — it will feel like "+feels+"°C. Wear your warmest coat and thermals — watch your step as paths could be icy.","#2563EB","rgba(37,99,235,.15)",i);}
      else if(feels<=0){addAlert("🟡 YELLOW","Cold Weather","It's going to feel freezing "+when+" — around "+feels+"°C. Make sure you have your hat, scarf and gloves before you step outside.","#3B82F6","rgba(59,130,246,.12)",i);}
      // Heavy rain
      if(rain>=85&&(code>=61&&code<=82)){addAlert("🟠 AMBER","Heavy Rain Warning","Very heavy rain likely "+when+". Take your umbrella and a waterproof coat — you will really need them today.","#2563EB","rgba(37,99,235,.15)",i);}
      // Strong wind (today only since we don't have weekly wind data)
      if(i===0&&wind>=80){addAlert("🔴 RED","Dangerous Wind Warning","Extremely dangerous winds today. Stay indoors. Do not go near trees or exposed areas — it really is not safe today.","#DC2626","rgba(220,38,38,.15)",i);}
      else if(i===0&&wind>=55){addAlert("🟠 AMBER","Strong Wind Warning","Strong winds today. Avoid tall trees and exposed areas. Take it steady if you are driving today.","#D97706","rgba(217,119,6,.15)",i);}
    });

    // Remove duplicates — keep earliest day for same alert type
    const seen=new Set();
    const unique=als.filter(a=>{
      const key=a.level+a.title.split("—")[1];
      if(seen.has(key))return false;
      seen.add(key);return true;
    });

    // Sort by day then severity
    unique.sort((a,b)=>a.day-b.day);
    setAlerts(unique.slice(0,5)); // max 5 alerts
  }

  // Fetch weather warnings based on weather data
  function getWarnings(w){
    if(!w)return[];
    const warnings=[];
    const feels=w.feels,temp=w.temp,wind=w.wind,rain=w.rain,code=w.code;
    // Red warnings
    if(wind>=80){warnings.push({level:"red",color:"#DC2626",bg:"rgba(220,38,38,.15)",emoji:"🔴",title:"RED WARNING — Dangerous Winds",day:"Today",advice:"Extremely dangerous winds expected. Stay indoors and away from windows. Avoid going outside if at all possible."});}
    else if(wind>=55){warnings.push({level:"amber",color:"#D97706",bg:"rgba(217,119,6,.15)",emoji:"🟠",title:"AMBER WARNING — Strong Winds",day:"Today",advice:"Very strong winds — stay away from trees and open exposed areas. Secure anything in your garden."});}
    else if(wind>=35){warnings.push({level:"yellow",color:"#CA8A04",bg:"rgba(202,138,4,.12)",emoji:"🟡",title:"YELLOW WARNING — Windy",day:"Today",advice:"Gusty winds today — hold onto your hat! Take extra care if you're out and about."});}
    if(temp>=35){warnings.push({level:"red",color:"#DC2626",bg:"rgba(220,38,38,.15)",emoji:"🔴",title:"RED WARNING — Extreme Heat",day:"Today",advice:"Dangerously hot today. Stay in the shade, wear loose light clothing and keep a cool water bottle with you at all times."});}
    else if(temp>=30){warnings.push({level:"amber",color:"#D97706",bg:"rgba(217,119,6,.15)",emoji:"🟠",title:"AMBER WARNING — Heat Wave",day:"Today",advice:"Very hot today. Drink plenty of water, wear light loose clothing and avoid going out between 11am and 3pm."});}
    else if(temp>=25){warnings.push({level:"yellow",color:"#CA8A04",bg:"rgba(202,138,4,.12)",emoji:"🟡",title:"YELLOW WARNING — Hot Weather",day:"Today",advice:"Warm day ahead — take a water bottle out with you and apply suncream before heading out."});}
    if(code>=95){warnings.push({level:"red",color:"#DC2626",bg:"rgba(220,38,38,.15)",emoji:"🔴",title:"RED WARNING — Thunderstorm",day:"Today",advice:"Severe thunderstorm warning. Stay indoors, keep away from windows and avoid using electrical items."});}
    else if(code>=80&&rain>=70){warnings.push({level:"amber",color:"#D97706",bg:"rgba(217,119,6,.15)",emoji:"🟠",title:"AMBER WARNING — Heavy Rain",day:"Today",advice:"Heavy rain expected — flooding possible in low-lying areas. Keep wellies handy and stay on higher ground."});}
    else if(rain>=60){warnings.push({level:"yellow",color:"#CA8A04",bg:"rgba(202,138,4,.12)",emoji:"🟡",title:"YELLOW WARNING — Rain",day:"Today",advice:"Wet day ahead — take your umbrella and a waterproof jacket. Watch your step on slippery surfaces."});}
    if(feels<=-5){warnings.push({level:"red",color:"#DC2626",bg:"rgba(220,38,38,.15)",emoji:"🔴",title:"RED WARNING — Extreme Cold",day:"Today",advice:"Dangerously cold conditions. Wear thermal layers, cover your face and keep your time outdoors as short as possible."});}
    else if(feels<=0){warnings.push({level:"amber",color:"#D97706",bg:"rgba(217,119,6,.15)",emoji:"🟠",title:"AMBER WARNING — Ice & Frost",day:"Today",advice:"Icy conditions likely — wear warm grippy shoes and take extra care on pavements and steps."});}
    else if(feels<=4){warnings.push({level:"yellow",color:"#CA8A04",bg:"rgba(202,138,4,.12)",emoji:"🟡",title:"YELLOW WARNING — Cold Snap",day:"Today",advice:"Cold snap today — wrap up warm with layers, a hat and gloves before heading out."});}
    // Check upcoming week for warnings
    if(w.week){
      w.week.slice(1,4).forEach((d,i)=>{
        const dayLabel=i===0?"Tomorrow":i===1?"In 2 days":"In 3 days";
        if(d.rain>=80&&d.max<5){warnings.push({level:"amber",color:"#D97706",bg:"rgba(217,119,6,.12)",emoji:"🟠",title:"UPCOMING — Cold & Wet",day:dayLabel,advice:"Cold wet weather coming "+dayLabel.toLowerCase()+". Plan ahead — get your warm waterproof gear ready now."});}
        if(d.max>=30){warnings.push({level:"yellow",color:"#CA8A04",bg:"rgba(202,138,4,.1)",emoji:"🟡",title:"UPCOMING — Hot Weather",day:dayLabel,advice:"Hot weather arriving "+dayLabel.toLowerCase()+". Stock up on water and plan any outdoor activities for early morning."});}
      });
    }
    return warnings;
  }

      const fromDate=new Date(holidayFrom);

      const tripMonth=fromDate.getMonth();
      const tripMonthName=monthNames[tripMonth];

        avgMin=Math.round(d.daily.temperature_2m_min.reduce((a,b)=>a+b,0)/7);
        rainDays=d.daily.precipitation_probability_max.filter(r=>r>50).length;
      }else{
        isFuture=true;
        try{
          const yr=fromDate.getFullYear()-1;
          const mm=String(tripMonth+1).padStart(2,"0");
          const url="https://archive-api.open-meteo.com/v1/archive?latitude="+la+"&longitude="+lo+"&start_date="+yr+"-"+mm+"-01&end_date="+yr+"-"+mm+"-28&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=auto";
          const d=await fetch(url).then(r=>r.json());
          if(d.daily&&d.daily.temperature_2m_max&&d.daily.temperature_2m_max.length>0){
            avgMax=Math.round(d.daily.temperature_2m_max.reduce((a,b)=>a+b,0)/d.daily.temperature_2m_max.length);
            avgMin=Math.round(d.daily.temperature_2m_min.reduce((a,b)=>a+b,0)/d.daily.temperature_2m_min.length);
            rainDays=d.daily.precipitation_sum.filter(r=>r>1).length;
          }else throw new Error("no data");
        }catch{
          const summerM=la>0?[5,6,7,8]:[11,0,1,2];
          const winterM=la>0?[11,0,1]:[5,6,7];
          const isSummerM=summerM.includes(tripMonth),isWinterM=winterM.includes(tripMonth);
          const base=la>55?{s:18,w:4}:la>45?{s:24,w:6}:la>30?{s:30,w:12}:la>10?{s:33,w:26}:{s:30,w:28};
          avgMax=isSummerM?base.s:isWinterM?base.w:Math.round((base.s+base.w)/2);
          avgMin=avgMax-8;rainDays=isSummerM&&la>40?3:isWinterM&&la>40?12:5;
        }
      }
      const isHot=avgMax>=26,isWarm=avgMax>=18,isMild=avgMax>=12,isCold=avgMax<12;
      const isRainy=rainDays>=10,isSomeRain=rainDays>=5;

      else if(isCold){reply=cn+" in "+tripMonthName+" is cold — typically around "+avgMax+"°C! 🧥 Pack a proper warm coat, jumpers, thermals and waterproof boots. Gloves, hat and scarf are essential. "+src;}
      else{reply=cn+" in "+tripMonthName+" typically sees around "+avgMax+"°C with "+rainDays+" rainy days. 🌤️ Pack layers — lighter clothes plus a warm layer and waterproof jacket. A compact umbrella is always handy! "+src;}
      setHolidayResult({city:cn+", "+co,text:reply,avgMax,avgMin,rainDays,isFuture,tripMonthName});
    }catch{setHolidayResult({city:holidayCity,text:"I had trouble fetching that destination — check the city name and try again!",avgMax:20,avgMin:12,rainDays:2,isFuture:false});}

                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {["Coat today?","Rain Tuesday?","Best day this week?","Hot weekend?"].map((q,i)=>(
                      <button key={i} onClick={()=>setChatInput(q)} style={{...G,padding:"6px 12px",fontSize:11,fontWeight:700,color:S.acc,border:"1px solid "+S.acc+"40",borderRadius:100,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",background:S.acc+"15"}}>{q}</button>
                    ))}
                  </div>
                </div>
              )
            )}

            {/* SEARCH TAB */}
            {tab==="search"&&(
              !isPremium?<PremiumLock icon="🔍" title="Search Any City" desc="Check the weather anywhere in the world — Paris, New York, Tokyo, anywhere."/>:(
                <div>
                  <div style={{display:"flex",gap:8,marginBottom:14}}>
                    <input value={searchCity} onChange={e=>setSearchCity(e.target.value)} onKeyDown={e=>e.key==="Enter"&&searchCityWeather()} placeholder="Search any city…" style={{flex:1,...G,padding:"13px 16px",fontSize:14,color:S.text,fontFamily:"'DM Sans',sans-serif",outline:"none",borderRadius:100}}/>
                    <button onClick={searchCityWeather} style={{background:S.acc,border:"none",borderRadius:100,width:48,height:48,fontSize:20,cursor:"pointer",flexShrink:0}}>🔍</button>
                  </div>
                  {searching&&<div style={{...G,padding:"20px",textAlign:"center",opacity:.6}}>Searching…</div>}
                  {searchWx&&(()=>{
                    const stype=wxType(searchWx.code,searchWx.isDay);
                    const sse=SC[stype];
                    const spe=plainEnglish({...searchWx,humid:70});
                    return(
                      <Card>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                          <div><div style={{fontSize:16,fontWeight:800}}>{searchWx.name}</div><div style={{fontSize:13,opacity:.6,marginTop:3}}>{sse.em} {sse.name}</div></div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontFamily:"'Fraunces',serif",fontSize:52,fontWeight:900,lineHeight:1}}>{searchWx.temp}°</div>
                            <div style={{fontSize:12,opacity:.6}}>feels {searchWx.feels}°</div>
                          </div>
                        </div>
                        <div style={{background:"rgba(255,255,255,.15)",borderRadius:16,padding:"14px",fontSize:14,fontWeight:700,lineHeight:1.55,marginBottom:12}}>{spe.verdict}</div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                          {[{e:"🌡️",l:"Outside",v:spe.feel},{e:"💨",l:"Wind",v:spe.windWord},{e:"🌧️",l:"Rain",v:spe.rainWord}].map((item,i)=>(
                            <div key={i} style={{background:"rgba(255,255,255,.12)",borderRadius:14,padding:"12px 8px",textAlign:"center"}}>
                              <div style={{fontSize:18,marginBottom:4}}>{item.e}</div>
                              <div style={{fontSize:9,opacity:.5,letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:3}}>{item.l}</div>
                              <div style={{fontSize:10,fontWeight:700,lineHeight:1.3}}>{item.v}</div>
                            </div>
                          ))}
                        </div>
                      </Card>
                    );
                  })()}
                  {!searchWx&&!searching&&<div style={{...G,padding:"20px",opacity:.5,textAlign:"center",fontSize:13}}>Type a city name above and tap 🔍</div>}
                </div>
              )
            )}

            {/* EVENT TAB */}
            {tab==="event"&&(
              !isPremium?<PremiumLock icon="🗓️" title="Event Planner" desc={'"Will it be dry for my BBQ on Saturday?"\n"Good weather for the school sports day?"\n"Should I book an outdoor wedding?"'}/>:(
                <div>
                  <Card>
                    <div style={{fontFamily:"'Fraunces',serif",fontSize:19,fontWeight:900,marginBottom:16}}>🗓️ Plan your event</div>
                    <div style={{fontSize:12,opacity:.6,marginBottom:6}}>What's the event?</div>
                    <input value={eventName} onChange={e=>setEventName(e.target.value)} placeholder="e.g. BBQ, Wedding, Sports Day, Party" style={{width:"100%",background:"rgba(255,255,255,.18)",border:"1px solid "+S.bdr,borderRadius:14,padding:"12px 16px",fontSize:14,color:S.text,fontFamily:"'DM Sans',sans-serif",outline:"none",marginBottom:12,boxSizing:"border-box"}}/>
                    <div style={{fontSize:12,opacity:.6,marginBottom:6}}>What date?</div>
                    <input type="date" value={eventDate} onChange={e=>setEventDate(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,.18)",border:"1px solid "+S.bdr,borderRadius:14,padding:"12px 16px",fontSize:14,color:S.text,fontFamily:"'DM Sans',sans-serif",outline:"none",marginBottom:14,boxSizing:"border-box"}}/>
                    <button onClick={checkEvent} style={{width:"100%",background:S.acc,border:"none",borderRadius:14,padding:"14px",fontSize:14,fontWeight:800,color:"white",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
                      {eventLoading?"Checking forecast…":"Ask Skyla 🩷"}
                    </button>
                  </Card>
                  {eventResult&&(
                    <Card>
                      <div style={{display:"flex",gap:12,marginBottom:12,alignItems:"center"}}>
                        <div style={{fontSize:32}}>{SC[wxType(eventResult.code,1)]?.em||"⛅"}</div>
                        <div><div style={{fontSize:14,fontWeight:800}}>{eventName}</div><div style={{fontSize:11,opacity:.6}}>{eventDate} · {eventResult.max}° high / {eventResult.min}° low · 💧{eventResult.rain}%</div></div>
                      </div>
                      <div style={{background:"rgba(255,255,255,.15)",borderRadius:14,padding:"14px",fontSize:13,lineHeight:1.65,fontWeight:500}}>{eventResult.text}</div>
                    </Card>
                  )}
                  <Card>
                    <div style={{fontSize:11,opacity:.5,marginBottom:8}}>💡 Quick picks</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {["BBQ","Wedding","School Sports Day","Garden Party","Camping","Birthday Party","Outdoor Concert","Marathon"].map((e,i)=>(
                        <button key={i} onClick={()=>setEventName(e)} style={{background:S.acc+"18",border:"1px solid "+S.acc+"35",borderRadius:100,padding:"5px 12px",fontSize:11,fontWeight:700,color:S.acc,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>{e}</button>
                      ))}
                    </div>
                  </Card>
                </div>
              )
            )}

            {/* HOLIDAY TAB */}
            {tab==="holiday"&&(
              !isPremium?<PremiumLock icon="✈️" title="Holiday Mode" desc="Tell Skyla where you're going and she'll tell you exactly what to pack — from flip flops to raincoats. Works for holidays months away using climate data!"/>:(
                <div>
                  <Card>
                    <div style={{fontFamily:"'Fraunces',serif",fontSize:19,fontWeight:900,marginBottom:16}}>✈️ Plan your holiday</div>
                    <div style={{fontSize:12,opacity:.6,marginBottom:6}}>Where are you going?</div>
                    <input value={holidayCity} onChange={e=>setHolidayCity(e.target.value)} placeholder="e.g. Tenerife, Paris, New York" style={{width:"100%",background:"rgba(255,255,255,.18)",border:"1px solid "+S.bdr,borderRadius:14,padding:"12px 16px",fontSize:14,color:S.text,fontFamily:"'DM Sans',sans-serif",outline:"none",marginBottom:12,boxSizing:"border-box"}}/>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                      <div>
                        <div style={{fontSize:12,opacity:.6,marginBottom:6}}>From</div>
                        <input type="date" value={holidayFrom} onChange={e=>setHolidayFrom(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,.18)",border:"1px solid "+S.bdr,borderRadius:14,padding:"11px 12px",fontSize:13,color:S.text,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"}}/>
                      </div>
                      <div>
                        <div style={{fontSize:12,opacity:.6,marginBottom:6}}>To</div>
                        <input type="date" value={holidayTo} onChange={e=>setHolidayTo(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,.18)",border:"1px solid "+S.bdr,borderRadius:14,padding:"11px 12px",fontSize:13,color:S.text,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"}}/>
                      </div>
                    </div>
                    <button onClick={checkHoliday} style={{width:"100%",background:S.acc,border:"none",borderRadius:14,padding:"14px",fontSize:14,fontWeight:800,color:"white",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
                      {holidayLoading?"Checking destination…":"What should I pack? 🧳"}
                    </button>
                  </Card>
                  {holidayResult&&(
                    <Card>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                        <div>
                          <div style={{fontSize:16,fontWeight:800}}>{holidayResult.city}</div>
                          <div style={{fontSize:11,opacity:.6,marginTop:2}}>{holidayResult.isFuture?"Typical "+holidayResult.tripMonthName+" weather":"Live 7-day forecast"}</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontFamily:"'Fraunces',serif",fontSize:36,fontWeight:900,lineHeight:1}}>{holidayResult.avgMax}°</div>
                          <div style={{fontSize:11,opacity:.6}}>/ {holidayResult.avgMin}°</div>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:8,marginBottom:12}}>
                        {[{e:"🌡️",l:"Up to "+holidayResult.avgMax+"°",s:"daytime"},{e:"🌧️",l:holidayResult.rainDays+" rainy days",s:"out of 7"},{e:"🧳",l:"Pack check",s:"below ↓"}].map((item,i)=>(
                          <div key={i} style={{...G,flex:1,padding:"10px 8px",textAlign:"center",borderRadius:14}}>
                            <div style={{fontSize:18}}>{item.e}</div>
                            <div style={{fontSize:10,fontWeight:700,marginTop:4}}>{item.l}</div>
                            <div style={{fontSize:9,opacity:.5}}>{item.s}</div>
                          </div>
                        ))}
                      </div>
                      <div style={{background:"rgba(255,255,255,.15)",borderRadius:14,padding:"14px",fontSize:13,lineHeight:1.65,fontWeight:500}}>{holidayResult.text}</div>
                    </Card>
                  )}
                </div>
              )
            )}

            {/* WEEK TAB */}
            {tab==="week"&&(
              <Card>
                <Lbl>📅 7-Day Forecast — tap to dress Skyla</Lbl>
                {wx.week.map((d,i)=>{
                  const dtype=wxType(d.code,1);
                  return(
                    <div key={i} onClick={()=>{setPickedD(i===pickedD?null:i);setPickedH(null);}} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 10px",borderRadius:16,background:pickedD===i?S.acc+"25":"transparent",border:pickedD===i?"1px solid "+S.acc+"50":"1px solid transparent",marginBottom:4,cursor:"pointer",transition:"all .2s"}}>
                      <div style={{width:60,fontSize:13,fontWeight:i===0?800:500,opacity:i===0?1:.85}}>{d.short}</div>
                      <div style={{fontSize:24}}>{SC[dtype]?.em||"🌤️"}</div>
                      <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{wmoDesc(d.code)}</div></div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:14,fontWeight:800}}>{d.max}°<span style={{opacity:.4,fontWeight:400,fontSize:12}}>/{d.min}°</span></div>
                        <div style={{fontSize:11,color:d.rain>50?S.acc:"inherit",opacity:d.rain>50?1:.55}}>💧{d.rain}%</div>
                      </div>
                    </div>
                  );
                })}
                {pickedD!==null&&<button onClick={()=>setPickedD(null)} style={{marginTop:8,fontSize:11,color:S.sub,background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>← Back to today</button>}
              </Card>
            )}

            {/* TRAVEL TAB */}
            {tab==="travel"&&(
              <div>
                <Card style={{border:"1px solid "+S.acc+"35"}}>
                  <div style={{fontFamily:"'Fraunces',serif",fontSize:19,fontWeight:900,marginBottom:6}}>🚌 Travel Updates</div>
                  <div style={{fontSize:12,opacity:.6,marginBottom:16,lineHeight:1.5}}>Weather-related travel disruptions for your area — trains, buses, flights and more.</div>
                  <button onClick={()=>checkTravel(null)} style={{width:"100%",background:S.acc,border:"none",borderRadius:14,padding:"14px",fontSize:14,fontWeight:800,color:"white",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",marginBottom:12}}>
                    {travelLoading?"Checking updates…":"🚌 Check Travel Updates for "+city}
                  </button>
                  <div style={{display:"flex",gap:8}}>
                    <input value={travelSearch} onChange={e=>setTravelSearch(e.target.value)} onKeyDown={e=>e.key==="Enter"&&checkTravel(travelSearch)} placeholder="Search another location…" style={{flex:1,background:"rgba(255,255,255,.18)",border:"1px solid "+S.bdr,borderRadius:14,padding:"11px 14px",fontSize:13,color:S.text,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
                    <button onClick={()=>checkTravel(travelSearch)} style={{background:"rgba(255,255,255,.2)",border:"1px solid "+S.bdr,borderRadius:14,padding:"11px 16px",fontSize:13,fontWeight:800,color:S.text,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap"}}>Search</button>
                  </div>
                </Card>
                {travelLoading&&(
                  <div style={{...G,padding:"20px",textAlign:"center"}}>
                    <div style={{width:32,height:32,border:"3px solid rgba(255,255,255,.2)",borderTop:"3px solid "+S.acc,borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 12px"}}/>
                    <div style={{fontSize:13,opacity:.6}}>Checking travel updates…</div>
                  </div>
                )}
                {travelUpdates&&(
                  <Card>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                      <div>
                        <div style={{fontSize:15,fontWeight:800}}>📍 {travelUpdates.location}</div>
                        <div style={{fontSize:11,opacity:.5,marginTop:2}}>Updated {travelUpdates.time}</div>
                      </div>
                      <div style={{fontSize:22}}>{S.em}</div>
                    </div>
                    <div style={{background:"rgba(255,255,255,.15)",borderRadius:16,padding:"16px",fontSize:13,lineHeight:1.8,fontWeight:500,whiteSpace:"pre-wrap"}}>{travelUpdates.text}</div>
                    <button onClick={()=>checkTravel(travelUpdates.location)} style={{marginTop:12,fontSize:11,color:S.acc,background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:700}}>↻ Refresh</button>
                  </Card>
                )}
                {!travelUpdates&&!travelLoading&&(
                  <div style={{...G,padding:"20px",textAlign:"center",opacity:.5,fontSize:13}}>
                    Tap the button above to check weather-related travel disruptions for your area
                  </div>
                )}
              </div>
            )}

            {/* MORE TAB */}
            {tab==="more"&&(
              <div>
                {/* Morning Briefing */}
                {isPremium?(
                  <div style={{...G,padding:"20px",marginBottom:12,border:"1px solid "+S.acc+"35"}}>
                    <Lbl>🌅 Morning Briefing</Lbl>
                    <div style={{fontSize:13,opacity:.7,marginBottom:12,lineHeight:1.6}}>Set your wake-up time and Skyla sends you a weather briefing every morning.</div>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <input type="time" value={briefingTime} onChange={e=>setBriefingTime(e.target.value)} style={{flex:1,background:"rgba(255,255,255,.18)",border:"1px solid "+S.bdr,borderRadius:14,padding:"12px 16px",fontSize:18,fontWeight:700,color:S.text,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
                      <button onClick={saveBriefing} style={{background:briefingSaved?"#10B981":S.acc,border:"none",borderRadius:14,padding:"12px 16px",fontSize:13,fontWeight:800,color:"white",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"background .3s"}}>
                        {briefingSaved?"✓ Saved!":"Set Time"}
                      </button>
                    </div>
                    {briefingSaved&&<div style={{fontSize:12,color:"#10B981",fontWeight:600,marginTop:8}}>✓ Briefing set for {briefingTime} every morning!</div>}
                  </div>
                ):(
                  <div onClick={()=>setShowPaywall(true)} style={{...G,padding:"16px",marginBottom:12,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
                    <div style={{fontSize:28}}>🌅</div>
                    <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>Morning Briefing</div><div style={{fontSize:11,opacity:.5}}>Wake up to Skyla's daily forecast</div></div>
                    <div style={{background:"#E91E8C",borderRadius:10,padding:"5px 10px",fontSize:10,fontWeight:800,color:"white"}}>PREMIUM</div>
                  </div>
                )}
                {/* Family Weather */}
                {isPremium?(
                  <Card>
                    <Lbl>👨‍👩‍👧 Family Weather</Lbl>
                    {famMembers.map((m,i)=>{
                      const ftype=wxType(m.code,m.isDay);
                      const fS=SC[ftype];
                      const fPE=plainEnglish({...m,humid:70});
                      return(
                        <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:i<famMembers.length-1?"1px solid rgba(255,255,255,.1)":"none"}}>
                          <div style={{fontSize:28}}>{fS.em}</div>
                          <div style={{flex:1}}>
                            <div style={{fontSize:14,fontWeight:800}}>{m.name}</div>
                            <div style={{fontSize:11,opacity:.6}}>{m.city}</div>
                            <div style={{fontSize:12,fontWeight:500,marginTop:3}}>{fPE.verdict}</div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontFamily:"'Fraunces',serif",fontSize:28,fontWeight:900,lineHeight:1}}>{m.temp}°</div>
                            <button onClick={()=>{const u=famMembers.filter((_,j)=>j!==i);setFamMembers(u);ss("skyla_fam",u);}} style={{fontSize:10,color:S.sub,background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",marginTop:4}}>Remove</button>
                          </div>
                        </div>
                      );
                    })}
                    <div style={{marginTop:12,display:"flex",gap:8,flexWrap:"wrap"}}>
                      <input value={newFamName} onChange={e=>setNewFamName(e.target.value)} placeholder="Name" style={{flex:1,minWidth:80,background:"rgba(255,255,255,.18)",border:"1px solid "+S.bdr,borderRadius:12,padding:"10px 12px",fontSize:13,color:S.text,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
                      <input value={newFamCity} onChange={e=>setNewFamCity(e.target.value)} placeholder="City" style={{flex:2,minWidth:100,background:"rgba(255,255,255,.18)",border:"1px solid "+S.bdr,borderRadius:12,padding:"10px 12px",fontSize:13,color:S.text,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
                      <button onClick={addFamMember} style={{background:S.acc,border:"none",borderRadius:12,padding:"10px 14px",fontSize:13,fontWeight:800,color:"white",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
                        {famLoading?"…":"Add"}
                      </button>
                    </div>
                  </Card>
                ):(
                  <div onClick={()=>setShowPaywall(true)} style={{...G,padding:"16px",marginBottom:12,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
                    <div style={{fontSize:28}}>👨‍👩‍👧</div>
                    <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>Family Weather</div><div style={{fontSize:11,opacity:.5}}>Track weather for everyone you love</div></div>
                    <div style={{background:"#E91E8C",borderRadius:10,padding:"5px 10px",fontSize:10,fontWeight:800,color:"white"}}>PREMIUM</div>
                  </div>
                )}
                {/* Personalise */}
                <Card style={{border:"1px solid "+S.acc+"35"}}>
                  <Lbl>🎨 Personalise Skyla</Lbl>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    {[{id:"female",icon:"👧",label:"Skyla Girl",desc:"Pink girl 🩷"},{id:"male",icon:"👦",label:"Skyla Boy",desc:"Cool boy 💙"}].map(opt=>(
                      <button key={opt.id} onClick={()=>toggleGender(opt.id)} style={{background:gender===opt.id?S.acc+"25":"rgba(255,255,255,.12)",border:gender===opt.id?"2px solid "+S.acc:"1px solid "+S.bdr,borderRadius:18,padding:"16px 12px",cursor:"pointer",textAlign:"center",transition:"all .2s",fontFamily:"'DM Sans',sans-serif"}}>
                        <div style={{fontSize:34,marginBottom:6}}>{opt.icon}</div>
                        <div style={{fontSize:13,fontWeight:800,color:gender===opt.id?S.acc:"inherit"}}>{opt.label}</div>
                        <div style={{fontSize:11,opacity:.6,marginTop:2}}>{opt.desc}</div>
                        {gender===opt.id&&<div style={{fontSize:10,color:S.acc,fontWeight:700,marginTop:4}}>✓ Active</div>}
                      </button>
                    ))}
                  </div>
                </Card>
                {/* Secret Tester Unlock */}
                <SecretUnlock isPremium={isPremium} setIsPremium={setIsPremium}/>

                {/* Streak */}
                <Card>
                  <Lbl>🔥 Your Streak</Lbl>
                  <div style={{display:"flex",alignItems:"center",gap:16}}>
                    <div style={{fontSize:52}}>🔥</div>
                    <div>
                      <div style={{fontFamily:"'Fraunces',serif",fontSize:46,fontWeight:900,color:S.acc,lineHeight:1}}>{streak}</div>
                      <div style={{fontSize:13,opacity:.6,marginTop:4}}>day{streak!==1?"s":""} in a row</div>
                      <div style={{fontSize:12,opacity:.5,marginTop:2}}>{streak<3?"Keep going!":streak<7?"Building a habit 🎯":streak<30?"On fire! 🔥":"Legendary! 👑"}</div>
                    </div>
                  </div>
                </Card>
                {!isPremium&&(
                  <button onClick={()=>setShowPaywall(true)} style={{width:"100%",...G,borderRadius:18,padding:"18px",fontSize:15,fontWeight:800,cursor:"pointer",background:"linear-gradient(135deg,rgba(233,30,140,.2),rgba(194,24,91,.2))",border:"1px solid rgba(233,30,140,.45)",color:"#E91E8C",marginBottom:10,fontFamily:"'DM Sans',sans-serif"}}>
                    🩷 Upgrade to Premium — £3.98/month
                  </button>
                )}
              </div>
            )}

            {/* REFRESH */}
            <button onClick={load} style={{width:"100%",marginTop:4,...G,borderRadius:100,padding:"15px",color:S.sub,fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:700,cursor:"pointer",transition:"all .25s",border:"none"}}
              onMouseEnter={e=>{e.currentTarget.style.background=S.acc;e.currentTarget.style.color="white";}}
              onMouseLeave={e=>{e.currentTarget.style.background=G.background;e.currentTarget.style.color=S.sub;}}>
              ↻ &nbsp;Refresh Skyla
            </button>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
