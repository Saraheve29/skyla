<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#FFB7C5">
<link rel="manifest" href="/manifest.json">
<title>Skyla AI Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,90%,100%{transform:scaleY(1)}93%{transform:scaleY(0.05)}}
@keyframes rainFall{0%{opacity:0;transform:translateY(-20px)}10%{opacity:1}90%{opacity:.6}100%{opacity:0;transform:translateY(100vh)}}
@keyframes snowDrift{0%{opacity:0;transform:translateY(-10px) rotate(0deg)}10%{opacity:.9}100%{opacity:0;transform:translateY(100vh) rotate(360deg)}}
@keyframes cloudSail{from{transform:translateX(-350px)}to{transform:translateX(110vw)}}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
@keyframes bolt{0%,85%,100%{opacity:0}87%,92%{opacity:1}}
@keyframes wave{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef}=React;

function sg(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function wmoDesc(c){
  const m={0:"Clear sky",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",45:"Foggy",51:"Light drizzle",61:"Light rain",63:"Rain",65:"Heavy rain",71:"Light snow",73:"Snow",75:"Heavy snow",80:"Light showers",81:"Showers",82:"Heavy showers",95:"Thunderstorm",96:"Thunderstorm"};
  return m[c]||"Cloudy";
}

function wxType(c,d){
  if(!d)return"night";
  if(c===0)return"sunny";
  if(c<=2)return"partly";
  if(c<=3)return"cloudy";
  if(c>=95)return"stormy";
  if(c>=71&&c<=77)return"snowy";
  if(c>=51)return"rainy";
  return"partly";
}

const SC={
  sunny:{acc:"#D97706",text:"#1C0A00",sub:"rgba(28,10,0,.5)",bdr:"rgba(255,255,255,.4)",em:"☀️",bg:"linear-gradient(175deg,#FF8C00 0%,#FFA500 15%,#FFD700 35%,#87CEEB 60%,#4FC3F7 100%)"},
  partly:{acc:"#1565C0",text:"#0C1A3D",sub:"rgba(12,26,61,.5)",bdr:"rgba(255,255,255,.45)",em:"⛅",bg:"linear-gradient(175deg,#1976D2 0%,#42A5F5 30%,#90CAF9 60%,#E3F2FD 100%)"},
  cloudy:{acc:"#455A64",text:"#0F172A",sub:"rgba(15,23,42,.5)",bdr:"rgba(255,255,255,.35)",em:"☁️",bg:"linear-gradient(175deg,#546E7A 0%,#78909C 30%,#B0BEC5 60%,#CFD8DC 100%)"},
  rainy:{acc:"#60A5FA",text:"#EFF6FF",sub:"rgba(239,246,255,.5)",bdr:"rgba(255,255,255,.18)",em:"🌧️",bg:"linear-gradient(175deg,#0d1b3e,#1e3a8a,#1976d2)"},
  snowy:{acc:"#0369A1",text:"#082F49",sub:"rgba(8,47,73,.5)",bdr:"rgba(255,255,255,.45)",em:"❄️",bg:"linear-gradient(175deg,#90a4ae,#cfd8dc,#f4f8fa)"},
  stormy:{acc:"#A78BFA",text:"#EEF2FF",sub:"rgba(238,242,255,.5)",bdr:"rgba(255,255,255,.12)",em:"⛈️",bg:"linear-gradient(175deg,#04020f,#1a0f3d,#3730a3)"},
  night:{acc:"#818CF8",text:"#F0F4FF",sub:"rgba(240,244,255,.5)",bdr:"rgba(255,255,255,.12)",em:"🌙",bg:"linear-gradient(175deg,#020408,#0a1628,#162a4a)"},
};

function plainEnglish(w){
  if(!w)return{verdict:"",feel:"",windWord:"",rainWord:"",deceiving:false,coldGap:0};
  const{temp,feels,wind,rain}=w;
  const coldGap=Math.max(0,temp-feels);
  const deceiving=temp>=14&&coldGap>=4;
  const verdict=deceiving
    ?"Sneaky one — it looks nicer than it is! The wind makes it feel "+coldGap+"C colder than it looks."
    :feels<=0?"Dangerously cold — feels like "+feels+"C. Stay indoors if you can!"
    :feels<=4?"Bitterly cold — feels like "+feels+"C. Wrap up as warm as you possibly can!"
    :feels<=8?"Cold — feels like "+feels+"C. You will definitely need a warm coat today."
    :feels<=12?"Chilly — feels like "+feels+"C. A good warm jacket is a must."
    :feels<=16?"Cool — feels like "+feels+"C. A light jacket would be perfect today."
    :feels<=19?"Mild — feels like "+feels+"C. A light layer should be enough."
    :feels<=23?"Warm — feels like "+feels+"C. Light clothing is all you need today."
    :feels<=27?"Very warm — feels like "+feels+"C. Light summer clothes and stay hydrated!"
    :"Hot! Feels like "+feels+"C. Wear as little as you are comfortable in and drink plenty of water!";
  const feel=feels<=0?"Dangerously cold ❄️":feels<=4?"Bitterly cold 🥶":feels<=8?"Cold 🧥":feels<=12?"Chilly 🧣":feels<=16?"Cool 🌥️":feels<=19?"Mild 🌤️":feels<=23?"Warm ☀️":feels<=27?"Very warm 🌞":"Hot! 🔥";
  const windCold=feels<12;
  const windWord=wind<10?"Calm — barely any wind today."
    :wind<20?(windCold?"A light cold breeze — it will nip at you a little!":"A light refreshing breeze today.")
    :wind<35?(windCold?"A noticeable cold breeze — it will feel colder than the temperature suggests!":"A noticeable breeze — quite pleasant today.")
    :wind<50?(windCold?"Very windy and cold — the wind will cut right through you today!":"Very windy today — hold onto your hat!")
    :(windCold?"Dangerously strong cold winds — stay indoors if possible!":"Extremely strong winds today — take great care outside!");
  const rainWord=rain<15?"Looks dry — no umbrella needed.":rain<40?"Small chance of a shower.":rain<65?"Rain likely — take an umbrella.":"Very likely to rain — definitely take your umbrella!";
  return{verdict,feel,windWord,rainWord,deceiving,coldGap};
}

function BG({type}){
  const s=SC[type]||SC.partly;
  return(
    <div style={{position:"fixed",inset:0,background:s.bg,zIndex:-1,overflow:"hidden"}}>
      {type==="sunny"&&<>
        <div style={{position:"absolute",top:"-20px",right:"-20px",width:"220px",height:"220px",borderRadius:"50%",background:"radial-gradient(circle,#FFD700,#FF8C00)",opacity:.6,filter:"blur(2px)"}}/>
        <div style={{position:"absolute",top:"20px",right:"20px",width:"140px",height:"140px",borderRadius:"50%",background:"radial-gradient(circle,#FFFF88,#FFD700)",opacity:.9}}/>
        {[...Array(12)].map((_,i)=><div key={i} style={{position:"absolute",top:"88px",right:"88px",width:"3px",height:"55px",background:"linear-gradient(180deg,#FFD700,transparent)",transformOrigin:"top center",transform:"rotate("+i*30+"deg) translateY(-55px)",borderRadius:2}}/>)}
      </>}
      {type==="cloudy"&&<>
        <div style={{position:"absolute",top:"20px",left:"-30px",opacity:.7}}><svg width="200" height="70"><ellipse cx="100" cy="50" rx="90" ry="25" fill="rgba(200,210,220,.8)"/><ellipse cx="65" cy="38" rx="55" ry="36" fill="rgba(200,210,220,.8)"/><ellipse cx="140" cy="35" rx="50" ry="32" fill="rgba(200,210,220,.8)"/></svg></div>
        <div style={{position:"absolute",top:"80px",right:"-20px",opacity:.6}}><svg width="180" height="65"><ellipse cx="90" cy="45" rx="80" ry="22" fill="rgba(180,195,210,.8)"/><ellipse cx="55" cy="33" rx="48" ry="30" fill="rgba(180,195,210,.8)"/><ellipse cx="125" cy="31" rx="44" ry="27" fill="rgba(180,195,210,.8)"/></svg></div>
        <div style={{position:"absolute",top:"160px",left:"10px",opacity:.5}}><svg width="160" height="55"><ellipse cx="80" cy="38" rx="72" ry="20" fill="rgba(180,195,210,.8)"/><ellipse cx="48" cy="27" rx="42" ry="28" fill="rgba(180,195,210,.8)"/><ellipse cx="115" cy="25" rx="38" ry="24" fill="rgba(180,195,210,.8)"/></svg></div>
      </>}
      {type==="rainy"&&[...Array(40)].map((_,i)=>(
        <div key={i} style={{position:"absolute",left:(i*7.3)%100+"%",top:"-20px",width:"2px",height:"18px",background:"rgba(150,210,255,.5)",animation:"rainFall "+(.5+i%5*.1)+"s linear infinite",animationDelay:(i*.06)%2+"s",transform:"rotate(10deg)"}}/>
      ))}
      {type==="snowy"&&[...Array(35)].map((_,i)=>(
        <div key={i} style={{position:"absolute",left:(i*9)%100+"%",top:"-15px",fontSize:i%3===0?"18px":"10px",color:"rgba(200,230,255,.8)",animation:"snowDrift "+(2+i%6*.4)+"s linear infinite",animationDelay:(i*.15)%4+"s"}}>{"❄"}</div>
      ))}
      {type==="night"&&[...Array(60)].map((_,i)=>(
        <div key={i} style={{position:"absolute",left:(i*41)%99+"%",top:(i*24)%75+"%",width:i%5===0?"3px":"1.5px",height:i%5===0?"3px":"1.5px",background:"white",borderRadius:"50%",animation:"twinkle "+(1+i%5*.3)+"s ease-in-out infinite",animationDelay:(i*.1)%3+"s"}}/>
      ))}
      {type==="stormy"&&(
        <div style={{position:"absolute",left:"20%",top:"10%",animation:"bolt 6s ease-in-out infinite"}}>
          <svg width="30" height="90"><polyline points="20,0 8,42 18,42 4,90" stroke="#FDE68A" strokeWidth="4" fill="none" strokeLinecap="round"/></svg>
        </div>
      )}
    </div>
  );
}

function SkylaChar({type,gender}){
  const pink="#E91E8C",blue="#1565C0";
  const hc=gender==="male"?blue:pink;
  return(
    <div style={{animation:"float 6s ease-in-out infinite"}}>
      <svg width="140" height="160" viewBox="0 0 100 130">
        <ellipse cx="50" cy="55" rx="23" ry="24" fill="#FFB7C5"/>
        <ellipse cx="50" cy="38" rx="26" ry="20" fill={hc}/>
        {gender==="female"&&<>
          <path d="M24 38 Q18 70 26 90 Q34 100 40 95 Q28 72 28 48 Z" fill={hc}/>
          <path d="M76 38 Q82 70 74 90 Q66 100 60 95 Q72 72 72 48 Z" fill={hc}/>
          <path d="M50 16 Q60 10 65 16 Q58 20 50 16 Z" fill="#EF4444"/>
        </>}
        <ellipse cx="40" cy="52" rx="6" ry="7" fill="white"/>
        <ellipse cx="60" cy="52" rx="6" ry="7" fill="white"/>
        <ellipse cx="40" cy="53" rx="4.5" ry="5.5" fill={gender==="male"?blue:pink} style={{animation:"blink 5s ease-in-out infinite"}}/>
        <ellipse cx="60" cy="53" rx="4.5" ry="5.5" fill={gender==="male"?blue:pink} style={{animation:"blink 5s ease-in-out infinite",animationDelay:".2s"}}/>
        <circle cx="42" cy="51" r="1.8" fill="white" opacity=".9"/>
        <circle cx="62" cy="51" r="1.8" fill="white" opacity=".9"/>
        <ellipse cx="32" cy="60" rx="7" ry="4.5" fill={pink} opacity=".4"/>
        <ellipse cx="68" cy="60" rx="7" ry="4.5" fill={pink} opacity=".4"/>
        <path d="M42 67 Q50 73 58 67" stroke="#F48FAA" strokeWidth="1.8" fill="none" strokeLinecap="round"/>
        {type==="rainy"?<rect x="24" y="76" width="52" height="36" rx="12" fill="#FCD34D"/>
        :type==="snowy"?<rect x="22" y="74" width="56" height="38" rx="13" fill="#BAE6FD"/>
        :type==="sunny"?<path d="M34 87 Q50 82 66 87 L72 128 Q50 134 28 128 Z" fill="#FCD34D"/>
        :<rect x="28" y="80" width="44" height="26" rx="11" fill={gender==="male"?"#BFDBFE":"#FBCFE8"}/>}
        <rect x={type==="rainy"?"28":"30"} y="112" width="17" height="20" rx="7" fill={gender==="male"?"#1D4ED8":"#C2185B"}/>
        <rect x={type==="rainy"?"55":"53"} y="112" width="17" height="20" rx="7" fill={gender==="male"?"#1D4ED8":"#C2185B"}/>
      </svg>
    </div>
  );
}

function App(){
  const [wx,setWx]=useState(null);
  const [city,setCity]=useState("Your location");
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [tab,setTab]=useState("home");
  const [gender,setGender]=useState(()=>sg("skyla_gender")||"female");
  const [isPremium]=useState(true);
  const [talking,setTalking]=useState(false);
  const [ai,setAi]=useState(null);
  const [alerts,setAlerts]=useState([]);
  const [streak,setStreak]=useState(()=>sg("skyla_streak")||0);
  const [quickAns,setQuickAns]=useState(null);
  const [pickedH,setPickedH]=useState(null);
  const [pickedD,setPickedD]=useState(null);
  const [chatMsgs,setChatMsgs]=useState([{role:"skyla",text:"Hi! Ask me anything about the weather! Ask: coat? umbrella? best day this week?"}]);
  const [chatInput,setChatInput]=useState("");
  const [searchWx,setSearchWx]=useState(null);
  const [searching,setSearching]=useState(false);
  const [eventDate,setEventDate]=useState("");
  const [eventResult,setEventResult]=useState(null);
  const [holidayResult,setHolidayResult]=useState(null);
  const [holidayFrom,setHolidayFrom]=useState("");
  const [holidayTo,setHolidayTo]=useState("");
  const [travelUpdates,setTravelUpdates]=useState(null);
  const [travelLoading,setTravelLoading]=useState(false);
  const [famMembers,setFamMembers]=useState(()=>sg("skyla_fam")||[]);
  const [briefingTime,setBriefingTime]=useState(()=>sg("skyla_briefing")||"07:00");
  const [briefingSaved,setBriefingSaved]=useState(false);
  const [showPaywall,setShowPaywall]=useState(false);
  const [showAllWarnings,setShowAllWarnings]=useState(false);
  const clock=new Date();
  const DWX=(()=>{
    if(!wx)return null;
    if(pickedD!==null&&wx.week[pickedD])return{...wx,...wx.week[pickedD],isDay:1};
    if(pickedH!==null&&wx.hourly[pickedH])return{...wx,...wx.hourly[pickedH]};
    return wx;
  })();
  const type=DWX?wxType(DWX.code,DWX.isDay):"partly";
  const S=SC[type];
  const G={background:"rgba(255,255,255,.17)",backdropFilter:"blur(22px)",WebkitBackdropFilter:"blur(22px)",border:"1px solid "+S.bdr,borderRadius:24};
  const PE=DWX?plainEnglish(DWX):{verdict:"",feel:"",windWord:"",rainWord:"",deceiving:false,coldGap:0};

  function buildAlerts(w){
    if(!w||!w.week)return;
    const als=[];
    const days=[{temp:w.temp,feels:w.feels,wind:w.wind,rain:w.rain,code:w.code,max:w.maxT,min:w.minT,label:"Today"},...w.week.slice(1,7).map(d=>({temp:d.max,feels:d.feels||d.max-3,wind:25,rain:d.rain,code:d.code,max:d.max,min:d.min,label:d.day}))];
    days.forEach(d=>{
      const{feels,wind,rain,code,max,label}=d;
      if(code>=95)als.push({emoji:"🔴",level:"RED WARNING",title:"Thunderstorm",msg:"Severe thunderstorm "+label.toLowerCase()+". Stay indoors and away from windows.",color:"#DC2626",bg:"rgba(220,38,38,.15)",label});
      else if(max>=30)als.push({emoji:"🟠",level:"AMBER WARNING",title:"Heat Wave",msg:"Very hot "+label.toLowerCase()+" — "+max+"C. Drink plenty of water and wear light clothing.",color:"#D97706",bg:"rgba(217,119,6,.15)",label});
      else if(max>=25)als.push({emoji:"🟡",level:"YELLOW WARNING",title:"Hot Weather",msg:"Warm "+label.toLowerCase()+" — "+max+"C. Stay hydrated and use suncream if heading out.",color:"#CA8A04",bg:"rgba(202,138,4,.12)",label});
      if(feels<=-5)als.push({emoji:"🔴",level:"RED WARNING",title:"Extreme Cold",msg:"Dangerously cold "+label.toLowerCase()+" — feels like "+feels+"C. Stay indoors if possible.",color:"#DC2626",bg:"rgba(220,38,38,.15)",label});
      else if(feels<=0)als.push({emoji:"🟠",level:"AMBER WARNING",title:"Freezing",msg:"Very cold "+label.toLowerCase()+" — feels like "+feels+"C. Wear thermals and your warmest coat.",color:"#2563EB",bg:"rgba(37,99,235,.15)",label});
      else if(feels<=4)als.push({emoji:"🟡",level:"YELLOW WARNING",title:"Cold Snap",msg:"Cold "+label.toLowerCase()+" — feels like "+feels+"C. Hat, scarf and gloves are a must.",color:"#3B82F6",bg:"rgba(59,130,246,.12)",label});
      else if(feels<=8)als.push({emoji:"🟡",level:"YELLOW WARNING",title:"Cold Today",msg:"Chilly "+label.toLowerCase()+" — feels like "+feels+"C. Wrap up in a warm coat.",color:"#60A5FA",bg:"rgba(96,165,250,.1)",label});
      if(label==="Today"&&wind>=55)als.push({emoji:"🟠",level:"AMBER WARNING",title:"Strong Winds",msg:"Strong winds today. Stay away from trees and exposed areas.",color:"#D97706",bg:"rgba(217,119,6,.15)",label});
      else if(label==="Today"&&wind>=35)als.push({emoji:"🟡",level:"YELLOW WARNING",title:"Windy",msg:"Quite windy today — hold onto your hat in open areas.",color:"#CA8A04",bg:"rgba(202,138,4,.12)",label});
      else if(label==="Today"&&wind>=25)als.push({emoji:"🟡",level:"YELLOW WARNING",title:"Breezy",msg:"A noticeable breeze today. Good to know before heading out.",color:"#CA8A04",bg:"rgba(202,138,4,.10)",label});
      if(rain>=70&&code>=61)als.push({emoji:"🟠",level:"AMBER WARNING",title:"Heavy Rain",msg:"Heavy rain "+label.toLowerCase()+". Take your umbrella and a waterproof coat.",color:"#2563EB",bg:"rgba(37,99,235,.15)",label});
      else if(rain>=40&&code>=61)als.push({emoji:"🟡",level:"YELLOW WARNING",title:"Rain Expected",msg:"Rain likely "+label.toLowerCase()+". Pack your umbrella just in case.",color:"#60A5FA",bg:"rgba(96,165,250,.12)",label});
    });
    setAlerts(als.slice(0,6));
  }

  async function load(){
    setLoading(true);setError(null);
    try{
      const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000}));
      const{latitude:la,longitude:lo}=pos.coords;
      const cityRes=await fetch("https://nominatim.openstreetmap.org/reverse?lat="+la+"&lon="+lo+"&format=json").then(r=>r.json()).catch(()=>null);
      if(cityRes?.address){const a=cityRes.address;setCity(a.city||a.town||a.village||a.county||"Your location");}
      const url="https://api.open-meteo.com/v1/forecast?latitude="+la+"&longitude="+lo+"&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weathercode,is_day&hourly=temperature_2m,apparent_temperature,weathercode,precipitation_probability,wind_speed_10m&daily=weathercode,temperature_2m_max,temperature_2m_min,apparent_temperature_max,precipitation_probability_max&timezone=auto&forecast_days=7";
      const d=await fetch(url).then(r=>r.json());
      const cu=d.current;
      const hr=new Date().getHours();
      const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      const shorts=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const week=d.daily.time.map((t,i)=>{const dt=new Date(t);return{day:days[dt.getDay()],short:shorts[dt.getDay()],date:t,code:d.daily.weathercode[i],max:Math.round(d.daily.temperature_2m_max[i]),min:Math.round(d.daily.temperature_2m_min[i]),feels:Math.round(d.daily.apparent_temperature_max[i]),rain:d.daily.precipitation_probability_max[i]};});
      const hourly=d.hourly.time.slice(0,24).map((t,i)=>{const h=new Date(t).getHours();const lbl=h===0?"12am":h<12?h+"am":h===12?"12pm":(h-12)+"pm";return{h,lbl,temp:Math.round(d.hourly.temperature_2m[i]),feels:Math.round(d.hourly.apparent_temperature[i]),code:d.hourly.weathercode[i],rain:d.hourly.precipitation_probability[i]||0,wind:Math.round(d.hourly.wind_speed_10m[i]||0)};});
      const newWx={temp:Math.round(cu.temperature_2m),feels:Math.round(cu.apparent_temperature),humid:cu.relative_humidity_2m,wind:Math.round(cu.wind_speed_10m),code:cu.weathercode,isDay:cu.is_day,maxT:Math.round(d.daily.temperature_2m_max[0]),minT:Math.round(d.daily.temperature_2m_min[0]),rain:d.hourly.precipitation_probability[hr]||0,week,hourly};
      setWx(newWx);
      buildAlerts(newWx);
      const today=new Date().toDateString();
      const lastVisit=sg("skyla_last");
      const yesterday=new Date(Date.now()-86400000).toDateString();
      if(lastVisit!==today){const ns=lastVisit===yesterday?(sg("skyla_streak")||0)+1:1;setStreak(ns);ss("skyla_streak",ns);ss("skyla_last",today);}
      await getAI(newWx);
    }catch(e){setError("Could not get your location. Please allow location access and try again.");}
    setLoading(false);
  }

  async function getAI(w){
    if(!w)return;
    const PE2=plainEnglish(w);
    const pr="You are Skyla, a warm friendly AI weather companion. Weather: "+city+" "+w.temp+"C feels "+w.feels+"C "+wmoDesc(w.code)+" rain "+w.rain+"% wind "+w.wind+"kmh. Return ONLY valid JSON no backticks: {\"msg\":\"greeting 10 words emoji\",\"wear\":\"specific outfit for todays weather — actual clothing items like jeans jumper coat dress shorts — 8 words max — NO vague words like comfortable or appropriate\",\"tip\":\"14 plain words\",\"items\":[\"clothing item with emoji\",\"clothing or footwear with emoji\",\"accessory for this weather with emoji\",\"hot or iced drink depending on temperature with emoji — NO phone NO bags only weather appropriate clothing drinks and accessories\"],\"plant\":\"specific plant care for todays weather — mention if rain frost heat wind or dry — 15 words max\",\"plantAction\":\"3 word action\"}";
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:250,messages:[{role:"user",content:pr}]})});
      const data=await r.json();
      const txt=data.content&&data.content[0]?data.content[0].text:"{}";
      setAi(JSON.parse(txt.replace(/```json|```/g,"").trim()));
    }catch{

  async function speak(){
    if(!wx)return;
    if(talking){window.speechSynthesis&&window.speechSynthesis.cancel();if(window._skylaSource){try{window._skylaSource.stop();}catch{}window._skylaSource=null;}if(window._skylaAudio){window._skylaAudio.pause();window._skylaAudio=null;}setTalking(false);return;}
    const gr=clock.getHours()<12?"morning":clock.getHours()<17?"afternoon":"evening";
    const PE2=plainEnglish(wx);
    const txt="Good "+gr+"! "+PE2.verdict+" In "+city+" it is "+wx.temp+" degrees. "+PE2.windWord+" "+PE2.rainWord+" "+(ai&&ai.tip?ai.tip:"")+" Have a wonderful "+gr+"!";
    const vid=gender==="male"?"19kvUOlctd0lOdUEtgrI":"oeyHnQ7m56GJsOmhKb8l";
    setTalking(true);
    // Pre-create audio context on click to avoid browser autoplay block
    const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    try{
      const r=await fetch("/api/speak",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:txt,voiceId:vid})});
      if(!r.ok)throw new Error("failed "+r.status);
      const arrayBuf=await r.arrayBuffer();
      const decoded=await audioCtx.decodeAudioData(arrayBuf);
      const source=audioCtx.createBufferSource();
      source.buffer=decoded;
      source.connect(audioCtx.destination);
      source.onended=()=>{setTalking(false);audioCtx.close();};
      source.start(0);
      window._skylaSource=source;
    }catch(e){
      console.error("Voice error:",e);
      audioCtx.close();
      const u=new SpeechSynthesisUtterance(txt);
      const isMale=gender==="male";
      u.rate=isMale?1.0:1.1;
      u.pitch=isMale?0.85:1.6;
      u.volume=1;
      function doSpeak(){
        const vs=window.speechSynthesis.getVoices();
        let v=null;
        if(isMale){
          v=vs.find(x=>x.name==="Daniel")||vs.find(x=>x.name.includes("Oliver"))||vs.find(x=>x.name.includes("Arthur"))||vs.find(x=>x.name==="Google UK English Male")||vs.find(x=>x.lang==="en-GB"&&x.name.toLowerCase().includes("male"))||vs.find(x=>x.lang.startsWith("en-GB"))||vs.find(x=>x.lang.startsWith("en"));
        }else{
          v=vs.find(x=>x.name==="Samantha")||vs.find(x=>x.name==="Karen")||vs.find(x=>x.name==="Serena")||vs.find(x=>x.name==="Google UK English Female")||vs.find(x=>x.name.includes("Zira"))||vs.find(x=>x.name.includes("Hazel"))||vs.find(x=>x.lang==="en-GB"&&x.name.toLowerCase().includes("female"))||vs.filter(x=>x.lang.startsWith("en-GB"))[1]||vs.find(x=>x.lang.startsWith("en-GB"));
        }
        if(v)u.voice=v;
        u.onend=()=>setTalking(false);
        u.onerror=()=>setTalking(false);
        window.speechSynthesis.speak(u);
      }
      const vs=window.speechSynthesis.getVoices();
      if(vs.length>0){doSpeak();}
      else{window.speechSynthesis.onvoiceschanged=()=>doSpeak();}
    }
  }

  async function checkHoliday(){
    const dest=window._hcity||"";
    if(!dest.trim())return;
    try{
      const g=await fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(dest.trim())+"&count=1").then(r=>r.json());
      if(!g.results||!g.results[0]){setHolidayResult({city:dest,text:"Could not find that destination — try a nearby city!"});return;}
      const{latitude:la,longitude:lo,name:cn,country:co}=g.results[0];
      const from=new Date(holidayFrom);
      const daysAway=Math.round((from-new Date())/86400000);
      const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
      const tripMonth=from.getMonth();
      let avgMax=20,rainDays=4;
      if(daysAway<=14){
        const url="https://api.open-meteo.com/v1/forecast?latitude="+la+"&longitude="+lo+"&daily=temperature_2m_max,precipitation_probability_max&timezone=auto&forecast_days=7";
        const d=await fetch(url).then(r=>r.json());
        avgMax=Math.round(d.daily.temperature_2m_max.reduce((a,b)=>a+b,0)/7);
        rainDays=d.daily.precipitation_probability_max.filter(r=>r>50).length;
      }else{
        try{
          const yr=from.getFullYear()-1;
          const mm=String(tripMonth+1).padStart(2,"0");
          const url="https://archive-api.open-meteo.com/v1/archive?latitude="+la+"&longitude="+lo+"&start_date="+yr+"-"+mm+"-01&end_date="+yr+"-"+mm+"-28&daily=temperature_2m_max,precipitation_sum&timezone=auto";
          const d=await fetch(url).then(r=>r.json());
          if(d.daily&&d.daily.temperature_2m_max&&d.daily.temperature_2m_max.length>0){
            avgMax=Math.round(d.daily.temperature_2m_max.reduce((a,b)=>a+b,0)/d.daily.temperature_2m_max.length);
            rainDays=d.daily.precipitation_sum.filter(r=>r>1).length;
          }
        }catch{}
      }
      let reply="";
      if(avgMax>=28)reply=cn+" in "+months[tripMonth]+" is typically hot — around "+avgMax+"C! Pack light summer clothes, suncream and a sun hat. A light layer for evenings is handy.";
      else if(avgMax>=20)reply=cn+" in "+months[tripMonth]+" is warm and lovely — around "+avgMax+"C. Light clothes with a smart casual layer for evenings. "+rainDays+" rainy days expected.";
      else if(avgMax>=12)reply=cn+" in "+months[tripMonth]+" is mild — around "+avgMax+"C. Pack layers, a waterproof jacket and comfortable shoes. "+rainDays+" rainy days expected.";
      else reply=cn+" in "+months[tripMonth]+" is cold — around "+avgMax+"C. Pack a proper warm coat, jumpers and waterproof boots.";
      setHolidayResult({city:cn+", "+co,text:reply,avgMax,rainDays,month:months[tripMonth]});
    }catch{setHolidayResult({city:dest,text:"Had trouble fetching that destination — check the city name and try again!"});}
  }

            <Lbl>7-Day Forecast</Lbl>
            {wx.week.map((d,i)=>(
              <div key={i} onClick={()=>{setPickedD(i===pickedD?null:i);setPickedH(null);}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 8px",borderRadius:14,background:pickedD===i?S.acc+"25":"transparent",border:pickedD===i?"1px solid "+S.acc+"50":"1px solid transparent",marginBottom:3,cursor:"pointer"}}>
                <div style={{width:52,fontSize:12,fontWeight:i===0?800:500}}>{d.short}</div>
                <div style={{fontSize:22}}>{SC[wxType(d.code,1)].em}</div>
                <div style={{flex:1,fontSize:12,fontWeight:500}}>{wmoDesc(d.code)}</div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:13,fontWeight:800}}>{d.max}° <span style={{opacity:.4,fontWeight:400}}>/{d.min}°</span></div>
                  <div style={{fontSize:10,color:d.rain>50?S.acc:"inherit",opacity:d.rain>50?1:.5}}>{d.rain}% rain</div>
                </div>
              </div>
            ))}
            {pickedD!==null&&<button onClick={()=>setPickedD(null)} style={{marginTop:8,fontSize:11,color:S.sub,background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Back to today</button>}
          </Card>
        )}

        {/* MORE TAB */}
        {tab==="more"&&(
          <div>
            <div style={{...G,padding:"18px",marginBottom:12,border:"1px solid "+S.acc+"35"}}>
              <Lbl>Morning Briefing</Lbl>
              <div style={{fontSize:12,opacity:.6,marginBottom:10}}>Get a daily weather briefing at your chosen time.</div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <input type="time" value={briefingTime} onChange={e=>setBriefingTime(e.target.value)} style={{flex:1,background:"rgba(255,255,255,.18)",border:"1px solid "+S.bdr,borderRadius:12,padding:"11px 14px",fontSize:16,fontWeight:700,color:S.text,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
                <button onClick={()=>{ss("skyla_briefing",briefingTime);setBriefingSaved(true);setTimeout(()=>setBriefingSaved(false),2500);}} style={{background:briefingSaved?"#10B981":S.acc,border:"none",borderRadius:12,padding:"11px 16px",fontSize:12,fontWeight:800,color:"white",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>{briefingSaved?"Saved!":"Set Time"}</button>
              </div>
            </div>
            <Card>
              <Lbl>Family Weather</Lbl>
              {famMembers.map((m,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:i<famMembers.length-1?"1px solid rgba(255,255,255,.1)":"none"}}>
                  <div style={{fontSize:24}}>{SC[wxType(m.code,m.isDay)].em}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:800}}>{m.name}</div>
                    <div style={{fontSize:11,opacity:.6}}>{m.city}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"'Fraunces',serif",fontSize:26,fontWeight:900}}>{m.temp}°</div>
                    <button onClick={()=>{const u=famMembers.filter((_,j)=>j!==i);setFamMembers(u);ss("skyla_fam",u);}} style={{fontSize:10,color:S.sub,background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Remove</button>
                  </div>
                </div>
              ))}
              <div style={{marginTop:10,display:"flex",gap:6,flexWrap:"wrap"}}>
                <input id="fam-name" onInput={e=>{window._famname=e.target.value;}} placeholder="Name" style={{flex:1,minWidth:70,background:"rgba(255,255,255,.18)",border:"1px solid "+S.bdr,borderRadius:10,padding:"9px 11px",fontSize:12,color:S.text,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
                <input id="fam-city" onInput={e=>{window._famloc=e.target.value;}} placeholder="City" style={{flex:2,minWidth:90,background:"rgba(255,255,255,.18)",border:"1px solid "+S.bdr,borderRadius:10,padding:"9px 11px",fontSize:12,color:S.text,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
                <button onClick={addFam} style={{background:S.acc,border:"none",borderRadius:10,padding:"9px 12px",fontSize:12,fontWeight:800,color:"white",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Add</button>
              </div>
            </Card>
            <Card>
              <Lbl>Personalise Skyla</Lbl>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {[{id:"female",icon:"👧",label:"Skyla Girl"},{id:"male",icon:"👦",label:"Skyla Boy"}].map(o=>(
                  <button key={o.id} onClick={()=>{setGender(o.id);ss("skyla_gender",o.id);}} style={{background:gender===o.id?S.acc+"25":"rgba(255,255,255,.12)",border:gender===o.id?"2px solid "+S.acc:"1px solid "+S.bdr,borderRadius:16,padding:"14px",cursor:"pointer",textAlign:"center",fontFamily:"'DM Sans',sans-serif"}}>
                    <div style={{fontSize:30,marginBottom:5}}>{o.icon}</div>
                    <div style={{fontSize:12,fontWeight:800,color:gender===o.id?S.acc:"inherit"}}>{o.label}</div>
                    {gender===o.id&&<div style={{fontSize:9,color:S.acc,marginTop:3}}>Active</div>}
                  </button>
                ))}
              </div>
            </Card>
            <Card>
              <Lbl>Your Streak</Lbl>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{fontSize:44}}>🔥</div>
                <div>
                  <div style={{fontFamily:"'Fraunces',serif",fontSize:42,fontWeight:900,color:S.acc,lineHeight:1}}>{streak}</div>
                  <div style={{fontSize:12,opacity:.6,marginTop:3}}>day{streak!==1?"s":""} in a row</div>
                </div>
              </div>
            </Card>
          </div>
        )}

        <button onClick={load} style={{width:"100%",marginTop:4,...G,borderRadius:100,padding:"13px",color:S.sub,fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700,cursor:"pointer",border:"none"}}>
          Refresh Skyla
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
